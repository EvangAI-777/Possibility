<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REACTOR — React Component Artifact Deployment Loader</title>

  <!-- ── CDN Dependencies ──────────────────────────────────────────────── -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --reactor-glow: #58a6ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Upload Screen ─────────────────────────────────────────────────── */

    .upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .reactor-logo {
      width: 120px; height: 120px;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .reactor-core {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 50%;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 30px var(--reactor-glow), 0 0 60px rgba(88,166,255,0.3);
      animation: pulse-core 2s ease-in-out infinite;
    }

    .reactor-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(88,166,255,0.3);
      border-radius: 50%;
      animation: spin-ring 4s linear infinite;
    }
    .reactor-ring:nth-child(2) { width: 70px; height: 70px; }
    .reactor-ring:nth-child(3) { width: 100px; height: 100px; animation-duration: 6s; animation-direction: reverse; }
    .reactor-ring:nth-child(4) { width: 120px; height: 120px; animation-duration: 8s; }

    .reactor-ring::before {
      content: '';
      position: absolute;
      top: -4px; left: 50%;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      transform: translateX(-50%);
    }

    @keyframes pulse-core {
      0%, 100% { box-shadow: 0 0 30px var(--reactor-glow), 0 0 60px rgba(88,166,255,0.3); }
      50% { box-shadow: 0 0 50px var(--reactor-glow), 0 0 100px rgba(88,166,255,0.4); }
    }

    @keyframes spin-ring {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .upload-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .upload-subtitle {
      color: var(--text-muted);
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .drop-zone {
      width: min(90vw, 500px);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--surface);
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--surface-hover);
      box-shadow: 0 0 30px rgba(88,166,255,0.1);
    }

    .drop-zone-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .drop-zone-label {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .drop-zone-hint {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .file-name-display {
      margin-top: 1.5rem;
      padding: 0.6rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.9rem;
      color: var(--green);
      display: none;
    }

    .file-name-display.visible { display: inline-block; }

    /* ── Loading Screen ────────────────────────────────────────────────── */

    .loading-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .loading-screen.active { display: flex; }
    .upload-screen.hidden { display: none; }

    .loading-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: min(90vw, 420px);
    }

    .loading-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: center;
    }

    .loading-step {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 0;
      opacity: 0.3;
      transition: all 0.4s ease;
    }

    .loading-step.active {
      opacity: 1;
    }

    .loading-step.done {
      opacity: 0.7;
    }

    .step-indicator {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      border: 2px solid var(--border);
      transition: all 0.4s ease;
    }

    .loading-step.active .step-indicator {
      border-color: var(--accent);
      color: var(--accent);
      animation: step-pulse 1s ease-in-out infinite;
    }

    .loading-step.done .step-indicator {
      border-color: var(--green);
      color: var(--green);
      background: rgba(63,185,80,0.1);
    }

    @keyframes step-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(88,166,255,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(88,166,255,0); }
    }

    .step-text {
      font-size: 0.95rem;
    }

    .step-text .label { font-weight: 600; }
    .step-text .detail { color: var(--text-muted); font-size: 0.8rem; display: block; margin-top: 2px; }

    /* ── Component View ────────────────────────────────────────────────── */

    .component-view {
      display: none;
      min-height: 100vh;
    }

    .component-view.active { display: block; }

    .back-pill {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 99999;
      background: rgba(22,27,34,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    .back-pill:hover {
      background: rgba(22,27,34,0.95);
      color: var(--accent);
      border-color: var(--accent);
    }

    .back-pill .reactor-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse-core 2s ease-in-out infinite;
    }

    /* ── Error Display ─────────────────────────────────────────────────── */

    .error-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .error-screen.active { display: flex; }

    .error-card {
      background: var(--surface);
      border: 1px solid var(--red);
      border-radius: 16px;
      padding: 2.5rem;
      width: min(90vw, 550px);
      text-align: center;
    }

    .error-icon { font-size: 3rem; margin-bottom: 1rem; }

    .error-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 0.5rem;
    }

    .error-message {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      word-break: break-word;
    }

    .error-detail {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.8rem;
      color: var(--red);
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--accent-hover); }

    /* ── Responsive ────────────────────────────────────────────────────── */

    @media (max-width: 480px) {
      .drop-zone { padding: 2rem 1.5rem; }
      .loading-card { padding: 1.5rem; }
      .error-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- ── Upload Screen ─────────────────────────────────────────────────── -->
  <div id="upload-screen" class="upload-screen">
    <div class="reactor-logo">
      <div class="reactor-core"></div>
      <div class="reactor-ring"></div>
      <div class="reactor-ring"></div>
      <div class="reactor-ring"></div>
    </div>
    <h1 class="upload-title">REACTOR</h1>
    <p class="upload-subtitle">React Component Artifact Deployment Loader</p>
    <div id="drop-zone" class="drop-zone">
      <div class="drop-zone-icon">⚛️</div>
      <div class="drop-zone-label">Upload .jsx Component</div>
      <div class="drop-zone-hint">Click to browse or drag and drop a React component file</div>
      <input type="file" id="file-input" accept=".jsx,.js,.tsx,.ts">
    </div>
    <div id="file-name" class="file-name-display"></div>
  </div>

  <!-- ── Loading Screen ────────────────────────────────────────────────── -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-card">
      <div class="loading-title">Deploying Component</div>
      <div class="loading-step" id="step-read">
        <div class="step-indicator">📄</div>
        <div class="step-text">
          <span class="label">Reading file</span>
          <span class="detail" id="step-read-detail">Waiting...</span>
        </div>
      </div>
      <div class="loading-step" id="step-transpile">
        <div class="step-indicator">⚙️</div>
        <div class="step-text">
          <span class="label">Transpiling JSX</span>
          <span class="detail" id="step-transpile-detail">Waiting...</span>
        </div>
      </div>
      <div class="loading-step" id="step-render">
        <div class="step-indicator">⚛️</div>
        <div class="step-text">
          <span class="label">Rendering component</span>
          <span class="detail" id="step-render-detail">Waiting...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Error Screen ──────────────────────────────────────────────────── -->
  <div id="error-screen" class="error-screen">
    <div class="error-card">
      <div class="error-icon">⚠️</div>
      <div class="error-title">Component Failed to Load</div>
      <div class="error-message" id="error-message"></div>
      <div class="error-detail" id="error-detail"></div>
      <button class="btn" onclick="REACTOR.reset()">↩ Try Another</button>
    </div>
  </div>

  <!-- ── Component Render Target ───────────────────────────────────────── -->
  <div id="component-view" class="component-view">
    <div class="back-pill" onclick="REACTOR.reset()">
      <span class="reactor-dot"></span>
      <span>REACTOR — Load Another</span>
    </div>
    <div id="component-root"></div>
  </div>

  <!-- ── Engine ────────────────────────────────────────────────────────── -->
  <script>
    const REACTOR = (() => {

      // ── State ──────────────────────────────────────────────────────────

      let currentRoot = null;

      const $ = (id) => document.getElementById(id);

      // ── Screen Management ──────────────────────────────────────────────

      function showScreen(name) {
        ['upload-screen', 'loading-screen', 'error-screen', 'component-view'].forEach(id => {
          const el = $(id);
          if (id === name) {
            el.classList.add('active');
            el.classList.remove('hidden');
          } else {
            el.classList.remove('active');
            el.classList.add('hidden');
          }
        });
      }

      function setStep(stepId, state, detail) {
        const step = $(stepId);
        step.classList.remove('active', 'done');
        if (state) step.classList.add(state);
        const detailEl = $(`${stepId}-detail`);
        if (detailEl && detail) detailEl.textContent = detail;
      }

      function resetSteps() {
        ['step-read', 'step-transpile', 'step-render'].forEach(id => {
          setStep(id, null, 'Waiting...');
        });
      }

      // ── Lucide-React Shim ──────────────────────────────────────────────
      //
      // Creates React functional components that render real SVG icons
      // using lucide's icon data. Falls back to a placeholder dot for
      // any icon not found in the lucide library.

      function buildLucideShim() {
        const shim = {};

        // Convert PascalCase → kebab-case for lucide lookup
        function toKebab(name) {
          return name.replace(/([a-z0-9])([A-Z])/g, '$1-$2')
                     .replace(/([A-Z])([A-Z][a-z])/g, '$1-$2')
                     .toLowerCase();
        }

        // Create a React icon wrapper from lucide icon data
        function createIcon(name) {
          const Component = (props) => {
            props = props || {};
            const { size = 24, color = 'currentColor', strokeWidth = 2, className = '', ...rest } = props;
            const kebab = toKebab(name);
            const iconData = lucide.icons && lucide.icons[kebab];

            if (!iconData) {
              // Fallback: render a simple circle placeholder
              return React.createElement('svg', {
                width: size, height: size, viewBox: '0 0 24 24',
                fill: 'none', stroke: color, strokeWidth: strokeWidth,
                strokeLinecap: 'round', strokeLinejoin: 'round',
                className: className, ...rest
              }, React.createElement('circle', { cx: 12, cy: 12, r: 4 }));
            }

            const paths = iconData[2] || [];
            return React.createElement('svg', {
              width: size, height: size, viewBox: '0 0 24 24',
              fill: 'none', stroke: color, strokeWidth: strokeWidth,
              strokeLinecap: 'round', strokeLinejoin: 'round',
              className: className, ...rest
            }, ...paths.map((pathStr, i) => {
              if (typeof pathStr === 'string') {
                return React.createElement('path', { key: i, d: pathStr });
              }
              // Some entries are [tag, attrs] arrays
              if (Array.isArray(pathStr)) {
                const [tag, attrs] = pathStr;
                return React.createElement(tag, { key: i, ...attrs });
              }
              return null;
            }));
          };
          Component.displayName = name;
          return Component;
        }

        // Use a Proxy so ANY icon name resolves — no hardcoded list needed
        return new Proxy(shim, {
          get(target, prop) {
            if (typeof prop !== 'string') return undefined;
            if (!target[prop]) {
              target[prop] = createIcon(prop);
            }
            return target[prop];
          }
        });
      }

      window.__LUCIDE_REACT__ = buildLucideShim();

      // ── callClaude Shim ────────────────────────────────────────────────

      window.__CALL_CLAUDE__ = {
        callClaude: async function(systemPrompt, userMessage, options) {
          options = options || {};
          const maxTokens = options.maxTokens || 2000;
          const history = options.history || [];

          if (!window.__ANTHROPIC_KEY__) {
            const key = prompt(
              'This component uses the Claude API.\n\n' +
              'Enter your Anthropic API key to enable AI features.\n' +
              '(Key is stored in memory only — never persisted.)'
            );
            if (!key) throw new Error('Anthropic API key is required for this component.');
            window.__ANTHROPIC_KEY__ = key;
          }

          const messages = [...history, { role: 'user', content: userMessage }];

          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': window.__ANTHROPIC_KEY__,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514',
              max_tokens: maxTokens,
              system: systemPrompt,
              messages: messages
            })
          });

          const data = await response.json();
          if (data.error) throw new Error(data.error.message || 'Claude API error');
          return (data.content && data.content.find(b => b.type === 'text')?.text) || '';
        }
      };

      // ── Import Transformer ─────────────────────────────────────────────
      //
      // Rewrites ES module import/export statements so the code can
      // execute in a plain <script> context with globals.

      function transformImports(code) {
        // Remove React imports (React is global via CDN)
        // Handles: import React from 'react'
        //          import React, { useState, useEffect } from 'react'
        //          import { useState } from 'react'
        code = code.replace(
          /import\s+(?:React\s*,?\s*)?(?:\{[^}]*\})?\s*from\s*['"]react['"];?\s*/g,
          (match) => {
            // Extract named imports like { useState, useEffect }
            const namedMatch = match.match(/\{\s*([^}]+)\s*\}/);
            if (namedMatch) {
              const names = namedMatch[1].split(',').map(n => n.trim()).filter(Boolean);
              return `const { ${names.join(', ')} } = React;\n`;
            }
            return '';
          }
        );

        // Replace lucide-react imports (may span multiple lines)
        code = code.replace(
          /import\s*\{([^}]+)\}\s*from\s*['"]lucide-react['"];?\s*/gs,
          (_, names) => {
            const cleaned = names.replace(/\s+/g, ' ').trim();
            return `const { ${cleaned} } = window.__LUCIDE_REACT__;\n`;
          }
        );

        // Replace callClaude imports
        code = code.replace(
          /import\s*\{([^}]+)\}\s*from\s*['"]\.\/callClaude['"];?\s*/g,
          (_, names) => {
            const cleaned = names.replace(/\s+/g, ' ').trim();
            return `const { ${cleaned} } = window.__CALL_CLAUDE__;\n`;
          }
        );

        // Handle other relative imports (best-effort: log warning, comment out)
        code = code.replace(
          /import\s+.*?from\s*['"]\.\/[^'"]+['"];?\s*/g,
          (match) => {
            console.warn('[REACTOR] Unknown import removed:', match.trim());
            return `/* REACTOR: removed unknown import — ${match.trim()} */\n`;
          }
        );

        // Handle non-relative imports (npm packages) — best-effort
        code = code.replace(
          /import\s+.*?from\s*['"](?!\.)[^'"]+['"];?\s*/g,
          (match) => {
            console.warn('[REACTOR] Unknown package import removed:', match.trim());
            return `/* REACTOR: removed unknown package import — ${match.trim()} */\n`;
          }
        );

        // Transform export default
        // Case 1: export default function Name() { ... }
        code = code.replace(
          /export\s+default\s+function\s+(\w+)/g,
          'function $1'
        );

        // Case 2: export default class Name { ... }
        code = code.replace(
          /export\s+default\s+class\s+(\w+)/g,
          'class $1'
        );

        // Case 3: export default SomeName;  (at end of file)
        // We handle this after execution by scanning for the identifier

        // Find the default export identifier
        const defaultExportMatch = code.match(/export\s+default\s+(\w+)\s*;/);
        let defaultExportName = null;

        if (defaultExportMatch) {
          defaultExportName = defaultExportMatch[1];
          code = code.replace(/export\s+default\s+\w+\s*;/g, '');
        } else {
          // For `export default function Name` — Name was captured above,
          // find the function name that was just transformed
          const funcMatch = code.match(/^function\s+(\w+)/m);
          const classMatch = code.match(/^class\s+(\w+)/m);
          // Look for the last top-level const/function definition as fallback
          const allDefs = [...code.matchAll(/(?:^|\n)(?:const|let|var|function|class)\s+(\w+)/g)];
          if (allDefs.length > 0) {
            defaultExportName = allDefs[allDefs.length - 1][1];
          }
        }

        // Remove any remaining export statements
        code = code.replace(/export\s+\{[^}]*\}\s*;?\s*/g, '');
        code = code.replace(/export\s+(const|let|var|function|class)\s+/g, '$1 ');

        // Append component capture at end
        if (defaultExportName) {
          code += `\nwindow.__COMPONENT__ = ${defaultExportName};\n`;
        }

        return code;
      }

      // ── Deployment Pipeline ────────────────────────────────────────────

      async function deploy(file) {
        showScreen('loading-screen');
        resetSteps();

        try {
          // Step 1: Read file
          setStep('step-read', 'active', `Reading ${file.name}...`);
          const sourceCode = await readFile(file);
          await delay(300);
          setStep('step-read', 'done', `${file.name} (${(sourceCode.length / 1024).toFixed(1)} KB)`);

          // Step 2: Transpile
          setStep('step-transpile', 'active', 'Transforming imports & transpiling JSX...');
          const transformed = transformImports(sourceCode);
          await delay(200);

          let transpiled;
          try {
            const result = Babel.transform(transformed, {
              presets: ['react'],
              filename: file.name
            });
            transpiled = result.code;
          } catch (babelErr) {
            throw new Error(`Babel transpilation failed:\n${babelErr.message}`);
          }
          await delay(300);
          setStep('step-transpile', 'done', 'JSX transpiled successfully');

          // Step 3: Render
          setStep('step-render', 'active', 'Mounting React component...');
          await delay(200);

          // Clear previous
          window.__COMPONENT__ = null;
          const container = $('component-root');
          if (currentRoot) {
            currentRoot.unmount();
            currentRoot = null;
          }
          container.innerHTML = '';

          // Execute the transpiled code
          try {
            const execFn = new Function(transpiled);
            execFn();
          } catch (execErr) {
            throw new Error(`Component execution failed:\n${execErr.message}`);
          }

          if (!window.__COMPONENT__) {
            throw new Error(
              'No component found. Make sure your file has a default export.\n' +
              'Example: export default function MyComponent() { ... }'
            );
          }

          // Create error boundary wrapper
          const ErrorBoundary = createErrorBoundary();

          // Render
          currentRoot = ReactDOM.createRoot(container);
          currentRoot.render(
            React.createElement(ErrorBoundary, null,
              React.createElement(window.__COMPONENT__)
            )
          );

          await delay(300);
          setStep('step-render', 'done', 'Component rendered');

          await delay(400);
          showScreen('component-view');

        } catch (err) {
          showError(err.message, err.stack || '');
        }
      }

      // ── Helpers ────────────────────────────────────────────────────────

      function readFile(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error('Failed to read file'));
          reader.readAsText(file);
        });
      }

      function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
      }

      function showError(message, detail) {
        $('error-message').textContent = message;
        $('error-detail').textContent = detail || 'No additional details';
        showScreen('error-screen');
      }

      function createErrorBoundary() {
        class ErrorBoundary extends React.Component {
          constructor(props) {
            super(props);
            this.state = { hasError: false, error: null };
          }
          static getDerivedStateFromError(error) {
            return { hasError: true, error: error };
          }
          componentDidCatch(error, info) {
            console.error('[REACTOR] Component error:', error, info);
          }
          render() {
            if (this.state.hasError) {
              return React.createElement('div', {
                style: {
                  display: 'flex', flexDirection: 'column', alignItems: 'center',
                  justifyContent: 'center', minHeight: '100vh', padding: '2rem',
                  background: '#0d1117', color: '#e6edf3', fontFamily: 'system-ui'
                }
              },
                React.createElement('div', {
                  style: {
                    background: '#161b22', border: '1px solid #f85149',
                    borderRadius: '16px', padding: '2.5rem', maxWidth: '550px',
                    textAlign: 'center', width: '100%'
                  }
                },
                  React.createElement('div', { style: { fontSize: '3rem', marginBottom: '1rem' } }, '💥'),
                  React.createElement('h2', { style: { color: '#f85149', marginBottom: '0.5rem' } },
                    'Component Runtime Error'),
                  React.createElement('p', { style: { color: '#8b949e', marginBottom: '1rem' } },
                    this.state.error?.message || 'An unexpected error occurred'),
                  React.createElement('button', {
                    onClick: () => REACTOR.reset(),
                    style: {
                      padding: '0.7rem 1.5rem', background: '#58a6ff', color: '#fff',
                      border: 'none', borderRadius: '8px', fontSize: '0.95rem',
                      fontWeight: 600, cursor: 'pointer'
                    }
                  }, '↩ Try Another Component')
                )
              );
            }
            return this.props.children;
          }
        }
        return ErrorBoundary;
      }

      // ── Public API ─────────────────────────────────────────────────────

      function reset() {
        if (currentRoot) {
          currentRoot.unmount();
          currentRoot = null;
        }
        $('component-root').innerHTML = '';
        $('file-input').value = '';
        $('file-name').classList.remove('visible');
        window.__COMPONENT__ = null;
        showScreen('upload-screen');
      }

      return { deploy, reset };
    })();

    // ── Event Wiring ──────────────────────────────────────────────────── //

    document.addEventListener('DOMContentLoaded', () => {
      const fileInput = document.getElementById('file-input');
      const dropZone = document.getElementById('drop-zone');
      const fileNameDisplay = document.getElementById('file-name');

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          fileNameDisplay.textContent = file.name;
          fileNameDisplay.classList.add('visible');
          setTimeout(() => REACTOR.deploy(file), 300);
        }
      });

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) {
          fileNameDisplay.textContent = file.name;
          fileNameDisplay.classList.add('visible');
          setTimeout(() => REACTOR.deploy(file), 300);
        }
      });
    });
  </script>

</body>
</html>

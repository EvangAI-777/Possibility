<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JASON — JSON Explorer</title>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --jason-glow: #f0883e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Upload Screen ─────────────────────────────────────────────────── */

    .upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .jason-logo {
      width: 120px; height: 120px;
      margin-bottom: 1.5rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .jason-braces {
      font-size: 4rem;
      font-weight: 300;
      color: var(--jason-glow);
      font-family: 'SFMono-Regular', Consolas, monospace;
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      text-shadow: 0 0 20px var(--jason-glow), 0 0 40px rgba(240,136,62,0.3);
      animation: brace-glow 2s ease-in-out infinite;
    }

    .jason-inner {
      font-size: 1.4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: var(--text-muted);
    }

    .jason-bracket {
      font-size: 1rem;
      color: var(--accent);
    }

    .jason-dot {
      width: 8px; height: 8px;
      background: var(--jason-glow);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes brace-glow {
      0%, 100% { text-shadow: 0 0 20px var(--jason-glow), 0 0 40px rgba(240,136,62,0.3); }
      50% { text-shadow: 0 0 30px var(--jason-glow), 0 0 60px rgba(240,136,62,0.5); }
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 8px var(--jason-glow), 0 0 16px rgba(240,136,62,0.3); }
      50% { box-shadow: 0 0 16px var(--jason-glow), 0 0 32px rgba(240,136,62,0.5); }
    }

    .upload-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--jason-glow), var(--yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .upload-subtitle {
      color: var(--text-muted);
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .drop-zone {
      width: min(90vw, 500px);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--surface);
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--jason-glow);
      background: var(--surface-hover);
      box-shadow: 0 0 30px rgba(240,136,62,0.1);
    }

    .drop-zone-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .drop-zone-label {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .drop-zone-hint {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .file-name-display {
      margin-top: 1.5rem;
      padding: 0.6rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.9rem;
      color: var(--green);
      display: none;
    }

    .file-name-display.visible { display: inline-block; }

    /* ── Loading Screen ────────────────────────────────────────────────── */

    .loading-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .loading-screen.active { display: flex; }
    .upload-screen.hidden { display: none; }

    .loading-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: min(90vw, 420px);
    }

    .loading-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: center;
    }

    .loading-step {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 0;
      opacity: 0.3;
      transition: all 0.4s ease;
    }

    .loading-step.active { opacity: 1; }
    .loading-step.done { opacity: 0.7; }

    .step-indicator {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      border: 2px solid var(--border);
      transition: all 0.4s ease;
    }

    .loading-step.active .step-indicator {
      border-color: var(--jason-glow);
      color: var(--jason-glow);
      animation: step-pulse 1s ease-in-out infinite;
    }

    .loading-step.done .step-indicator {
      border-color: var(--green);
      color: var(--green);
      background: rgba(63,185,80,0.1);
    }

    @keyframes step-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(240,136,62,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(240,136,62,0); }
    }

    .step-text { font-size: 0.95rem; }
    .step-text .label { font-weight: 600; }
    .step-text .detail { color: var(--text-muted); font-size: 0.8rem; display: block; margin-top: 2px; }

    /* ── Component View ────────────────────────────────────────────────── */

    .component-view {
      display: none;
      min-height: 100vh;
    }

    .component-view.active { display: block; }

    .back-pill {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 99999;
      background: rgba(22,27,34,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    .back-pill:hover {
      background: rgba(22,27,34,0.95);
      color: var(--jason-glow);
      border-color: var(--jason-glow);
    }

    .back-pill .jason-pill-dot {
      width: 8px; height: 8px;
      background: var(--jason-glow);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    /* ── Error Display ─────────────────────────────────────────────────── */

    .error-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .error-screen.active { display: flex; }

    .error-card {
      background: var(--surface);
      border: 1px solid var(--red);
      border-radius: 16px;
      padding: 2.5rem;
      width: min(90vw, 550px);
      text-align: center;
    }

    .error-icon { font-size: 3rem; margin-bottom: 1rem; }

    .error-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 0.5rem;
    }

    .error-message {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      word-break: break-word;
    }

    .error-detail {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.8rem;
      color: var(--red);
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--accent-hover); }

    /* ── JSON Explorer Layout ──────────────────────────────────────────── */

    .json-explorer {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      padding-top: 3.5rem;
    }

    .json-toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .json-search {
      flex: 1;
      min-width: 200px;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .json-search:focus {
      border-color: var(--jason-glow);
    }

    .json-search::placeholder {
      color: var(--text-muted);
    }

    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .view-toggle button {
      padding: 0.5rem 1rem;
      background: var(--surface);
      border: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    .view-toggle button.active {
      background: var(--jason-glow);
      color: #fff;
    }

    .view-toggle button:hover:not(.active) {
      background: var(--surface-hover);
      color: var(--text);
    }

    .json-breadcrumb {
      padding: 0.4rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      overflow-x: auto;
      white-space: nowrap;
    }

    .json-breadcrumb span {
      color: var(--jason-glow);
    }

    .json-stats {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* ── Tree View ─────────────────────────────────────────────────────── */

    .json-tree-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      overflow-x: auto;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .json-tree-container.hidden { display: none; }

    .json-node {
      padding-left: 1.25rem;
    }

    .json-node.root {
      padding-left: 0;
    }

    .json-toggle {
      cursor: pointer;
      user-select: none;
      display: inline-block;
      width: 1rem;
      text-align: center;
      color: var(--text-muted);
      transition: transform 0.15s;
    }

    .json-toggle:hover {
      color: var(--jason-glow);
    }

    .json-toggle.collapsed {
      transform: rotate(-90deg);
    }

    .json-key {
      color: var(--jason-glow);
      cursor: pointer;
    }

    .json-key:hover {
      text-decoration: underline;
    }

    .json-string { color: var(--green); }
    .json-number { color: var(--accent); }
    .json-boolean { color: var(--yellow); }
    .json-null { color: var(--red); opacity: 0.7; }

    .json-bracket {
      color: var(--text-muted);
    }

    .json-count {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-style: italic;
    }

    .json-children {
      overflow: hidden;
      transition: max-height 0.2s ease;
    }

    .json-children.collapsed {
      display: none;
    }

    .json-line {
      padding: 1px 0;
    }

    .json-line:hover {
      background: var(--surface-hover);
      border-radius: 4px;
    }

    .json-line.highlight {
      background: rgba(240,136,62,0.15);
      border-radius: 4px;
    }

    /* ── Raw View ──────────────────────────────────────────────────────── */

    .json-raw-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      overflow-x: auto;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.875rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    .json-raw-container.active { display: block; }

    /* ── Copy Toast ────────────────────────────────────────────────────── */

    .copy-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--green);
      color: var(--green);
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 99999;
      font-family: 'SFMono-Regular', Consolas, monospace;
    }

    .copy-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ────────────────────────────────────────────────────── */

    @media (max-width: 768px) {
      .json-explorer {
        padding: 1rem;
        padding-top: 3.5rem;
      }

      .json-toolbar {
        flex-direction: column;
      }

      .json-search {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .drop-zone { padding: 2rem 1.5rem; }
      .loading-card { padding: 1.5rem; }
      .error-card { padding: 1.5rem; }
    }

    .back-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: var(--accent, #58a6ff);
      text-decoration: none;
      font-size: 0.85rem;
      z-index: 9999;
      background: var(--bg, #0d1117);
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--border, #30363d);
      opacity: 0.7;
      transition: opacity 0.2s;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .back-link:hover { opacity: 1; text-decoration: underline; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">&larr; Possibility</a>

  <!-- ── Upload Screen ─────────────────────────────────────────────────── -->
  <div id="upload-screen" class="upload-screen">
    <div class="jason-logo">
      <div class="jason-braces">
        <span>{</span>
        <div class="jason-inner">
          <span class="jason-bracket">[ ]</span>
          <div class="jason-dot"></div>
        </div>
        <span>}</span>
      </div>
    </div>
    <h1 class="upload-title">JASON</h1>
    <p class="upload-subtitle">JSON Explorer</p>
    <div id="drop-zone" class="drop-zone">
      <div class="drop-zone-icon">{ }</div>
      <div class="drop-zone-label">Upload .json File</div>
      <div class="drop-zone-hint">Click to browse or drag and drop a JSON file</div>
      <input type="file" id="file-input" accept=".json">
    </div>
    <div id="file-name" class="file-name-display"></div>
  </div>

  <!-- ── Loading Screen ────────────────────────────────────────────────── -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-card">
      <div class="loading-title">Exploring JSON</div>
      <div class="loading-step" id="step-read">
        <div class="step-indicator">{ }</div>
        <div class="step-text">
          <span class="label">Reading file</span>
          <span class="detail" id="step-read-detail">Waiting...</span>
        </div>
      </div>
      <div class="loading-step" id="step-parse">
        <div class="step-indicator">[ ]</div>
        <div class="step-text">
          <span class="label">Parsing JSON</span>
          <span class="detail" id="step-parse-detail">Waiting...</span>
        </div>
      </div>
      <div class="loading-step" id="step-render">
        <div class="step-indicator">{ }</div>
        <div class="step-text">
          <span class="label">Rendering tree</span>
          <span class="detail" id="step-render-detail">Waiting...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Error Screen ──────────────────────────────────────────────────── -->
  <div id="error-screen" class="error-screen">
    <div class="error-card">
      <div class="error-icon">{ ! }</div>
      <div class="error-title">Failed to Parse JSON</div>
      <div class="error-message" id="error-message"></div>
      <div class="error-detail" id="error-detail"></div>
      <button class="btn" onclick="JASON.reset()">{ } Try Another</button>
    </div>
  </div>

  <!-- ── JSON Render Target ────────────────────────────────────────────── -->
  <div id="component-view" class="component-view">
    <div class="back-pill" onclick="JASON.reset()">
      <span class="jason-pill-dot"></span>
      <span>JASON — Load Another</span>
    </div>
    <div class="json-explorer">
      <div class="json-toolbar">
        <input type="text" id="json-search" class="json-search" placeholder="Search keys...">
        <div class="view-toggle">
          <button id="btn-tree" class="active" onclick="JASON.setView('tree')">Tree View</button>
          <button id="btn-raw" onclick="JASON.setView('raw')">Raw View</button>
        </div>
      </div>
      <div id="json-breadcrumb" class="json-breadcrumb"><span>root</span></div>
      <div id="json-stats" class="json-stats"></div>
      <div id="json-tree" class="json-tree-container"></div>
      <div id="json-raw" class="json-raw-container"></div>
    </div>
  </div>

  <div id="copy-toast" class="copy-toast">Copied!</div>

  <!-- ── Engine ────────────────────────────────────────────────────────── -->
  <script>
    const JASON = (() => {

      // ── State ──────────────────────────────────────────────────────────

      let parsedData = null;
      let currentView = 'tree';

      const $ = (id) => document.getElementById(id);

      // ── Screen Management ──────────────────────────────────────────────

      function showScreen(name) {
        ['upload-screen', 'loading-screen', 'error-screen', 'component-view'].forEach(id => {
          const el = $(id);
          if (id === name) {
            el.classList.add('active');
            el.classList.remove('hidden');
          } else {
            el.classList.remove('active');
            el.classList.add('hidden');
          }
        });
      }

      function setStep(stepId, state, detail) {
        const step = $(stepId);
        step.classList.remove('active', 'done');
        if (state) step.classList.add(state);
        const detailEl = $(`${stepId}-detail`);
        if (detailEl && detail) detailEl.textContent = detail;
      }

      function resetSteps() {
        ['step-read', 'step-parse', 'step-render'].forEach(id => {
          setStep(id, null, 'Waiting...');
        });
      }

      // ── Tree Rendering ─────────────────────────────────────────────────

      function renderTree(data, container) {
        container.innerHTML = '';
        const tree = buildNode(data, 'root', true);
        container.appendChild(tree);
      }

      function buildNode(value, key, isRoot) {
        const type = getType(value);
        const line = document.createElement('div');
        line.className = 'json-line';

        if (type === 'object' || type === 'array') {
          return buildCollapsible(value, key, type, isRoot);
        }

        // Primitive value
        if (!isRoot) {
          const keySpan = document.createElement('span');
          keySpan.className = 'json-key';
          keySpan.textContent = `"${key}"`;
          keySpan.dataset.path = key;
          keySpan.onclick = () => copyToClipboard(key);
          line.appendChild(keySpan);
          line.appendChild(document.createTextNode(': '));
        }

        const valSpan = document.createElement('span');
        valSpan.className = `json-${type}`;
        valSpan.textContent = type === 'string' ? `"${value}"` : String(value);
        valSpan.style.cursor = 'pointer';
        valSpan.onclick = () => copyToClipboard(type === 'string' ? value : String(value));
        line.appendChild(valSpan);

        return line;
      }

      function buildCollapsible(value, key, type, isRoot) {
        const wrapper = document.createElement('div');
        wrapper.className = isRoot ? 'json-node root' : 'json-node';

        const header = document.createElement('div');
        header.className = 'json-line';

        const toggle = document.createElement('span');
        toggle.className = 'json-toggle';
        toggle.textContent = '\u25BC';
        header.appendChild(toggle);

        if (!isRoot) {
          const keySpan = document.createElement('span');
          keySpan.className = 'json-key';
          keySpan.textContent = `"${key}"`;
          keySpan.onclick = () => copyToClipboard(key);
          header.appendChild(keySpan);
          header.appendChild(document.createTextNode(': '));
        }

        const openBracket = document.createElement('span');
        openBracket.className = 'json-bracket';
        openBracket.textContent = type === 'array' ? '[' : '{';
        header.appendChild(openBracket);

        const entries = type === 'array' ? value : Object.keys(value);
        const count = document.createElement('span');
        count.className = 'json-count';
        count.textContent = ` ${entries.length} ${type === 'array' ? (entries.length === 1 ? 'item' : 'items') : (entries.length === 1 ? 'key' : 'keys')} `;
        header.appendChild(count);

        wrapper.appendChild(header);

        const children = document.createElement('div');
        children.className = 'json-children';

        if (type === 'array') {
          value.forEach((item, i) => {
            children.appendChild(buildNode(item, String(i), false));
          });
        } else {
          Object.keys(value).forEach(k => {
            children.appendChild(buildNode(value[k], k, false));
          });
        }

        const closeBracket = document.createElement('div');
        closeBracket.className = 'json-line';
        const closeSpan = document.createElement('span');
        closeSpan.className = 'json-bracket';
        closeSpan.textContent = type === 'array' ? ']' : '}';
        closeBracket.appendChild(closeSpan);
        children.appendChild(closeBracket);

        wrapper.appendChild(children);

        toggle.onclick = () => {
          toggle.classList.toggle('collapsed');
          children.classList.toggle('collapsed');
        };

        return wrapper;
      }

      // ── Raw View ───────────────────────────────────────────────────────

      function renderRaw(data, container) {
        const raw = JSON.stringify(data, null, 2);
        container.textContent = '';
        container.appendChild(syntaxHighlight(raw));
      }

      function syntaxHighlight(json) {
        const fragment = document.createDocumentFragment();
        const pre = document.createElement('span');

        // Colorize via regex
        const highlighted = json.replace(
          /("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)/g,
          (match) => {
            let cls = 'json-number';
            if (/^"/.test(match)) {
              cls = /:$/.test(match) ? 'json-key' : 'json-string';
            } else if (/true|false/.test(match)) {
              cls = 'json-boolean';
            } else if (/null/.test(match)) {
              cls = 'json-null';
            }
            return `<span class="${cls}">${match}</span>`;
          }
        );

        pre.innerHTML = highlighted;
        fragment.appendChild(pre);
        return fragment;
      }

      // ── Search / Filter ────────────────────────────────────────────────

      function filterTree(query) {
        const treeContainer = $('json-tree');
        const lines = treeContainer.querySelectorAll('.json-line');
        const lowerQuery = query.toLowerCase();

        lines.forEach(line => {
          line.classList.remove('highlight');
        });

        if (!query) return;

        lines.forEach(line => {
          const keyEl = line.querySelector('.json-key');
          if (keyEl && keyEl.textContent.toLowerCase().includes(lowerQuery)) {
            line.classList.add('highlight');
            // Expand parent collapsed nodes
            let parent = line.parentElement;
            while (parent) {
              if (parent.classList.contains('json-children') && parent.classList.contains('collapsed')) {
                parent.classList.remove('collapsed');
                const toggle = parent.previousElementSibling?.querySelector('.json-toggle');
                if (toggle) toggle.classList.remove('collapsed');
              }
              parent = parent.parentElement;
            }
          }
        });
      }

      // ── Stats ──────────────────────────────────────────────────────────

      function computeStats(data) {
        let objects = 0, arrays = 0, strings = 0, numbers = 0, booleans = 0, nulls = 0;

        function walk(val) {
          const type = getType(val);
          if (type === 'object') {
            objects++;
            Object.values(val).forEach(walk);
          } else if (type === 'array') {
            arrays++;
            val.forEach(walk);
          } else if (type === 'string') {
            strings++;
          } else if (type === 'number') {
            numbers++;
          } else if (type === 'boolean') {
            booleans++;
          } else if (type === 'null') {
            nulls++;
          }
        }
        walk(data);

        const parts = [];
        if (objects) parts.push(`${objects} object${objects !== 1 ? 's' : ''}`);
        if (arrays) parts.push(`${arrays} array${arrays !== 1 ? 's' : ''}`);
        if (strings) parts.push(`${strings} string${strings !== 1 ? 's' : ''}`);
        if (numbers) parts.push(`${numbers} number${numbers !== 1 ? 's' : ''}`);
        if (booleans) parts.push(`${booleans} boolean${booleans !== 1 ? 's' : ''}`);
        if (nulls) parts.push(`${nulls} null${nulls !== 1 ? 's' : ''}`);
        return parts.join(', ');
      }

      // ── View Toggle ────────────────────────────────────────────────────

      function setView(view) {
        currentView = view;
        $('btn-tree').classList.toggle('active', view === 'tree');
        $('btn-raw').classList.toggle('active', view === 'raw');
        $('json-tree').classList.toggle('hidden', view !== 'tree');
        $('json-raw').classList.toggle('active', view === 'raw');
      }

      // ── Clipboard ──────────────────────────────────────────────────────

      function copyToClipboard(text) {
        const toast = $('copy-toast');
        toast.textContent = `Copied: ${text.length > 50 ? text.substring(0, 50) + '...' : text}`;

        try {
          navigator.clipboard.writeText(text);
        } catch (e) {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.style.cssText = 'position:fixed;opacity:0';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
        }

        toast.classList.add('visible');
        setTimeout(() => toast.classList.remove('visible'), 1500);
      }

      // ── Helpers ────────────────────────────────────────────────────────

      function getType(val) {
        if (val === null) return 'null';
        if (Array.isArray(val)) return 'array';
        return typeof val;
      }

      function readFile(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error('Failed to read file'));
          reader.readAsText(file);
        });
      }

      function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
      }

      function showError(message, detail) {
        $('error-message').textContent = message;
        $('error-detail').textContent = detail || 'No additional details';
        showScreen('error-screen');
      }

      // ── Deployment Pipeline ────────────────────────────────────────────

      async function deploy(file) {
        showScreen('loading-screen');
        resetSteps();

        try {
          // Step 1: Read file
          setStep('step-read', 'active', `Reading ${file.name}...`);
          const rawText = await readFile(file);
          await delay(300);
          setStep('step-read', 'done', `${file.name} (${(rawText.length / 1024).toFixed(1)} KB)`);

          // Step 2: Parse JSON
          setStep('step-parse', 'active', 'Parsing JSON...');
          await delay(200);

          try {
            parsedData = JSON.parse(rawText);
          } catch (parseErr) {
            throw new Error(`Invalid JSON:\n${parseErr.message}`);
          }
          await delay(300);
          setStep('step-parse', 'done', 'JSON parsed successfully');

          // Step 3: Render
          setStep('step-render', 'active', 'Building tree view...');
          await delay(200);

          renderTree(parsedData, $('json-tree'));
          renderRaw(parsedData, $('json-raw'));

          // Set breadcrumb
          const rootType = getType(parsedData);
          $('json-breadcrumb').innerHTML = `<span>root</span> (${rootType})`;

          // Set stats
          $('json-stats').textContent = computeStats(parsedData);

          // Reset view
          setView('tree');

          await delay(300);
          setStep('step-render', 'done', 'Tree rendered');

          await delay(400);
          showScreen('component-view');
          window.scrollTo(0, 0);

        } catch (err) {
          showError(err.message, err.stack || '');
        }
      }

      // ── Public API ─────────────────────────────────────────────────────

      function reset() {
        parsedData = null;
        $('json-tree').innerHTML = '';
        $('json-raw').textContent = '';
        $('json-search').value = '';
        $('json-breadcrumb').innerHTML = '<span>root</span>';
        $('json-stats').textContent = '';
        $('file-input').value = '';
        $('file-name').classList.remove('visible');
        setView('tree');
        showScreen('upload-screen');
      }

      return { deploy, reset, setView };
    })();

    // ── Event Wiring ──────────────────────────────────────────────────── //

    document.addEventListener('DOMContentLoaded', () => {
      const fileInput = document.getElementById('file-input');
      const dropZone = document.getElementById('drop-zone');
      const fileNameDisplay = document.getElementById('file-name');
      const searchInput = document.getElementById('json-search');

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          fileNameDisplay.textContent = file.name;
          fileNameDisplay.classList.add('visible');
          setTimeout(() => JASON.deploy(file), 300);
        }
      });

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) {
          fileNameDisplay.textContent = file.name;
          fileNameDisplay.classList.add('visible');
          setTimeout(() => JASON.deploy(file), 300);
        }
      });

      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        // Filter tree in place
        const treeContainer = document.getElementById('json-tree');
        const lines = treeContainer.querySelectorAll('.json-line');
        const lowerQuery = query.toLowerCase();

        lines.forEach(line => line.classList.remove('highlight'));

        if (!query) return;

        lines.forEach(line => {
          const keyEl = line.querySelector('.json-key');
          if (keyEl && keyEl.textContent.toLowerCase().includes(lowerQuery)) {
            line.classList.add('highlight');
            let parent = line.parentElement;
            while (parent) {
              if (parent.classList.contains('json-children') && parent.classList.contains('collapsed')) {
                parent.classList.remove('collapsed');
                const toggle = parent.previousElementSibling?.querySelector('.json-toggle');
                if (toggle) toggle.classList.remove('collapsed');
              }
              parent = parent.parentElement;
            }
          }
        });
      });
    });
  </script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JASON — JSON Explorer</title>

  <!-- No CDN dependencies — JSON.parse is native -->

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --jason-glow: #f0883e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* -- Upload Screen --------------------------------------------------- */

    .upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .jason-logo {
      width: 120px; height: 120px;
      margin-bottom: 1.5rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .jason-brace {
      font-size: 4rem;
      font-weight: 300;
      color: var(--jason-glow);
      line-height: 1;
      animation: brace-breathe 3s ease-in-out infinite;
      text-shadow: 0 0 20px rgba(240,136,62,0.4);
    }

    .jason-brace.right {
      animation-delay: 0.3s;
    }

    .jason-bracket {
      font-size: 2rem;
      font-weight: 400;
      color: var(--accent);
      margin: 0 2px;
      animation: bracket-float 4s ease-in-out infinite;
    }

    .jason-dot {
      width: 10px; height: 10px;
      background: var(--jason-glow);
      border-radius: 50%;
      margin: 0 4px;
      box-shadow: 0 0 12px var(--jason-glow), 0 0 24px rgba(240,136,62,0.4);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes brace-breathe {
      0%, 100% { text-shadow: 0 0 20px rgba(240,136,62,0.4); transform: scale(1); }
      50% { text-shadow: 0 0 30px rgba(240,136,62,0.6); transform: scale(1.05); }
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 12px var(--jason-glow), 0 0 24px rgba(240,136,62,0.4); }
      50% { box-shadow: 0 0 20px var(--jason-glow), 0 0 40px rgba(240,136,62,0.6); }
    }

    @keyframes bracket-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .upload-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--accent), var(--jason-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .upload-subtitle {
      color: var(--text-muted);
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .drop-zone {
      width: min(90vw, 500px);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--surface);
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--jason-glow);
      background: var(--surface-hover);
      box-shadow: 0 0 30px rgba(240,136,62,0.1);
    }

    .drop-zone-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .drop-zone-label {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .drop-zone-hint {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .file-name-display {
      margin-top: 1.5rem;
      padding: 0.6rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.9rem;
      color: var(--green);
      display: none;
    }

    .file-name-display.visible { display: inline-block; }


<style>
.ctrl-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.2rem; }
.ctrl-label { font-size: 13px; color: var(--color-text-secondary, #555); width: 120px; flex-shrink: 0; }
.ctrl-val {
  font-size: 14px; font-weight: 500; min-width: 72px; text-align: right;
  color: var(--color-text-primary, #222);
  background: var(--color-background-secondary, #f5f5f5);
  border: 1px solid var(--color-border, #ccc);
  border-radius: 6px; padding: 4px 8px;
  font-family: inherit;
  -moz-appearance: textfield;
}
.ctrl-val::-webkit-outer-spin-button,
.ctrl-val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.ctrl-val:focus { outline: 2px solid #1D9E75; border-color: #1D9E75; }
.ctrl-suffix { font-size: 13px; color: var(--color-text-secondary, #555); min-width: 24px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
.stat { background: var(--color-background-secondary, #f5f5f5); border-radius: var(--border-radius-md, 8px); padding: 12px 14px; }
.stat-label { font-size: 12px; color: var(--color-text-secondary, #555); margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 500; color: var(--color-text-primary, #222); }
.stat-value.green { color: #0F6E56; }
</style>

<div style="padding: 1rem 0;">

  <div class="ctrl-row">
    <span class="ctrl-label">Starting amount</span>
    <input type="range" min="1000" max="50000" step="1000" value="5000" id="principal" style="flex:1;">
    <span class="ctrl-suffix">$</span>
    <input type="number" class="ctrl-val" id="principal-num" min="1000" max="50000" step="1000" value="5000">
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">Annual rate</span>
    <input type="range" min="1" max="15" step="0.5" value="7" id="rate" style="flex:1;">
    <input type="number" class="ctrl-val" id="rate-num" min="1" max="15" step="0.5" value="7">
    <span class="ctrl-suffix">%</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">Years</span>
    <input type="range" min="1" max="40" step="1" value="20" id="years" style="flex:1;">
    <input type="number" class="ctrl-val" id="years-num" min="1" max="40" step="1" value="20">
    <span class="ctrl-suffix">yrs</span>
  </div>

  <div class="stat-grid">
    <div class="stat">
      <div class="stat-label">You put in</div>
      <div class="stat-value" id="stat-principal">$5,000</div>
    </div>
    <div class="stat">
      <div class="stat-label">Interest earned</div>
      <div class="stat-value green" id="stat-interest">$14,394</div>
    </div>
    <div class="stat">
      <div class="stat-label">Final balance</div>
      <div class="stat-value" id="stat-total">$19,394</div>
    </div>
  </div>

  <div style="position: relative; width: 100%; height: 260px;">
    <canvas id="ciChart"></canvas>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const fmt = (n) => '$' + Math.round(n).toLocaleString();

let chart;

function calcCompound(principal, rate, years) {
  const r = rate / 100;
  const labels = [], compData = [], simpleData = [];
  for (let y = 0; y <= years; y++) {
    labels.push(y === 0 ? 'Now' : 'Yr ' + y);
    compData.push(Math.round(principal * Math.pow(1 + r, y)));
    simpleData.push(Math.round(principal + principal * r * y));
  }
  return { labels, compData, simpleData };
}

// Sync slider <-> number input pairs
const pairs = [
  { slider: 'principal', num: 'principal-num' },
  { slider: 'rate',      num: 'rate-num' },
  { slider: 'years',     num: 'years-num' }
];

pairs.forEach(({ slider, num }) => {
  const s = document.getElementById(slider);
  const n = document.getElementById(num);

  s.addEventListener('input', () => { n.value = s.value; update(); });
  n.addEventListener('input', () => {
    // Clamp to slider range
    let v = parseFloat(n.value);
    if (isNaN(v)) return;
    v = Math.max(parseFloat(s.min), Math.min(parseFloat(s.max), v));
    s.value = v;
    update();
  });
  n.addEventListener('blur', () => {
    // On blur, snap to valid value
    let v = parseFloat(n.value);
    if (isNaN(v)) v = parseFloat(s.value);
    v = Math.max(parseFloat(s.min), Math.min(parseFloat(s.max), v));
    n.value = v;
    s.value = v;
    update();
  });
});

function update() {
  const principal = +document.getElementById('principal').value;
  const rate = +document.getElementById('rate').value;
  const years = +document.getElementById('years').value;

  // Keep number inputs in sync (for programmatic calls)
  document.getElementById('principal-num').value = principal;
  document.getElementById('rate-num').value = rate;
  document.getElementById('years-num').value = years;

  const { labels, compData, simpleData } = calcCompound(principal, rate, years);
  const finalComp = compData[compData.length - 1];
  const interest = finalComp - principal;

  document.getElementById('stat-principal').textContent = fmt(principal);
  document.getElementById('stat-interest').textContent = fmt(interest);
  document.getElementById('stat-total').textContent = fmt(finalComp);

  const skip = Math.ceil(years / 10);
  const filteredLabels = labels.filter((_, i) => i % skip === 0 || i === years);
  const filteredComp = compData.filter((_, i) => i % skip === 0 || i === years);
  const filteredSimple = simpleData.filter((_, i) => i % skip === 0 || i === years);

  if (chart) {
    chart.data.labels = filteredLabels;
    chart.data.datasets[0].data = filteredComp;
    chart.data.datasets[1].data = filteredSimple;
    chart.update();
  } else {
    chart = new Chart(document.getElementById('ciChart'), {
      type: 'line',
      data: {
        labels: filteredLabels,
        datasets: [
          {
            label: 'Compound interest',
            data: filteredComp,
            borderColor: '#1D9E75',
            backgroundColor: 'rgba(29,158,117,0.08)',
            fill: true,
            tension: 0.4,
            pointRadius: 3,
          },
          {
            label: 'Simple interest',
            data: filteredSimple,
            borderColor: '#888780',
            borderDash: [5, 4],
            backgroundColor: 'transparent',
            fill: false,
            tension: 0,
            pointRadius: 0,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (ctx) => ' ' + ctx.dataset.label + ': ' + fmt(ctx.parsed.y)
            }
          }
        },
        scales: {
          y: {
            ticks: { callback: (v) => '$' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : v), font: { size: 11 } },
            grid: { color: 'rgba(136,135,128,0.15)' }
          },
          x: {
            ticks: { font: { size: 11 }, autoSkip: false, maxRotation: 0 },
            grid: { display: false }
          }
        }
      }
    });
  }
}

update();
</script>

<div style="display: flex; gap: 20px; margin-top: 10px; font-size: 12px; color: var(--color-text-secondary, #555);">
  <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:3px;background:#1D9E75;border-radius:2px;display:inline-block;"></span> Compound</span>
  <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:3px;background:#888780;border-radius:2px;display:inline-block;border-top:2px dashed #888780;"></span> Simple</span>
</div>

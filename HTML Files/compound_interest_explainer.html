<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compound Interest Explainer - Possibility</title>
  <style>
    :root {
      --bg: #0b0f14;
      --surface: #141a22;
      --border: #2a3140;
      --text: #e2e8f0;
      --text-muted: #8191a6;
      --accent: #5b9cf5;
      --accent-hover: #7db4ff;
      --green: #3fb950;
      --color-text-primary: #e2e8f0;
      --color-text-secondary: #8191a6;
      --color-background-secondary: #141a22;
      --color-border: #2a3140;
      --border-radius-md: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      text-align: center;
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }
    header .tagline { color: var(--text-muted); font-size: 0.95rem; }

    .back-link {
      display: inline-block;
      margin-bottom: 1rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover { text-decoration: underline; }

    footer {
      text-align: center;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Slider track styling for dark theme */
    input[type="range"] {
      accent-color: #1aac7a;
    }

    .ctrl-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.2rem; }
    .ctrl-label { font-size: 13px; color: var(--color-text-secondary); width: 120px; flex-shrink: 0; }
    .ctrl-val {
      font-size: 14px; font-weight: 500; min-width: 72px; text-align: right;
      color: var(--color-text-primary);
      background: var(--color-background-secondary);
      border: 1px solid var(--color-border);
      border-radius: 6px; padding: 4px 8px;
      font-family: inherit;
      -moz-appearance: textfield;
    }
    .ctrl-val::-webkit-outer-spin-button,
    .ctrl-val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .ctrl-val:focus { outline: 2px solid #1aac7a; border-color: #1aac7a; }
    .ctrl-suffix { font-size: 13px; color: var(--color-text-secondary); min-width: 24px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: var(--color-background-secondary); border: 1px solid var(--border); border-radius: var(--border-radius-md); padding: 12px 14px; }
    .stat-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
    .stat-value.green { color: var(--green); }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">&larr; Back to Possibility</a>
    <header>
      <h1>Compound Interest Explainer</h1>
      <p class="tagline">See how your money grows — compound vs. simple interest, side by side.</p>
    </header>

    <div style="padding: 1rem 0;">

      <div class="ctrl-row">
        <span class="ctrl-label">Starting amount</span>
        <input type="range" min="1000" max="50000" step="1000" value="5000" id="principal" style="flex:1;">
        <span class="ctrl-suffix">$</span>
        <input type="number" class="ctrl-val" id="principal-num" min="1000" max="50000" step="1000" value="5000">
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">Annual rate</span>
        <input type="range" min="1" max="15" step="0.5" value="7" id="rate" style="flex:1;">
        <input type="number" class="ctrl-val" id="rate-num" min="1" max="15" step="0.5" value="7">
        <span class="ctrl-suffix">%</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">Years</span>
        <input type="range" min="1" max="40" step="1" value="20" id="years" style="flex:1;">
        <input type="number" class="ctrl-val" id="years-num" min="1" max="40" step="1" value="20">
        <span class="ctrl-suffix">yrs</span>
      </div>

      <div class="stat-grid">
        <div class="stat">
          <div class="stat-label">You put in</div>
          <div class="stat-value" id="stat-principal">$5,000</div>
        </div>
        <div class="stat">
          <div class="stat-label">Interest earned</div>
          <div class="stat-value green" id="stat-interest">$14,394</div>
        </div>
        <div class="stat">
          <div class="stat-label">Final balance</div>
          <div class="stat-value" id="stat-total">$19,394</div>
        </div>
      </div>

      <div style="position: relative; width: 100%; height: 300px;">
        <canvas id="ciChart"></canvas>
      </div>

      <div style="display: flex; gap: 20px; margin-top: 10px; font-size: 12px; color: var(--color-text-secondary);">
        <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:3px;background:#1aac7a;border-radius:2px;display:inline-block;"></span> Compound</span>
        <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:3px;background:#888780;border-radius:2px;display:inline-block;border-top:2px dashed #888780;"></span> Simple</span>
      </div>

    </div>

    <footer>
      <a href="index.html">Possibility</a> &middot; <a href="https://github.com/EvangAI-777/Possibility">GitHub</a>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
  const fmt = (n) => '$' + Math.round(n).toLocaleString();

  let chart;

  function calcCompound(principal, rate, years) {
    const r = rate / 100;
    const labels = [], compData = [], simpleData = [];
    for (let y = 0; y <= years; y++) {
      labels.push(y === 0 ? 'Now' : 'Yr ' + y);
      compData.push(Math.round(principal * Math.pow(1 + r, y)));
      simpleData.push(Math.round(principal + principal * r * y));
    }
    return { labels, compData, simpleData };
  }

  const pairs = [
    { slider: 'principal', num: 'principal-num' },
    { slider: 'rate',      num: 'rate-num' },
    { slider: 'years',     num: 'years-num' }
  ];

  pairs.forEach(({ slider, num }) => {
    const s = document.getElementById(slider);
    const n = document.getElementById(num);

    s.addEventListener('input', () => { n.value = s.value; update(); });
    n.addEventListener('input', () => {
      let v = parseFloat(n.value);
      if (isNaN(v)) return;
      v = Math.max(parseFloat(s.min), Math.min(parseFloat(s.max), v));
      s.value = v;
      update();
    });
    n.addEventListener('blur', () => {
      let v = parseFloat(n.value);
      if (isNaN(v)) v = parseFloat(s.value);
      v = Math.max(parseFloat(s.min), Math.min(parseFloat(s.max), v));
      n.value = v;
      s.value = v;
      update();
    });
  });

  function update() {
    const principal = +document.getElementById('principal').value;
    const rate = +document.getElementById('rate').value;
    const years = +document.getElementById('years').value;

    document.getElementById('principal-num').value = principal;
    document.getElementById('rate-num').value = rate;
    document.getElementById('years-num').value = years;

    const { labels, compData, simpleData } = calcCompound(principal, rate, years);
    const finalComp = compData[compData.length - 1];
    const interest = finalComp - principal;

    document.getElementById('stat-principal').textContent = fmt(principal);
    document.getElementById('stat-interest').textContent = fmt(interest);
    document.getElementById('stat-total').textContent = fmt(finalComp);

    const skip = Math.ceil(years / 10);
    const filteredLabels = labels.filter((_, i) => i % skip === 0 || i === years);
    const filteredComp = compData.filter((_, i) => i % skip === 0 || i === years);
    const filteredSimple = simpleData.filter((_, i) => i % skip === 0 || i === years);

    if (chart) {
      chart.data.labels = filteredLabels;
      chart.data.datasets[0].data = filteredComp;
      chart.data.datasets[1].data = filteredSimple;
      chart.update();
    } else {
      chart = new Chart(document.getElementById('ciChart'), {
        type: 'line',
        data: {
          labels: filteredLabels,
          datasets: [
            {
              label: 'Compound interest',
              data: filteredComp,
              borderColor: '#1aac7a',
              backgroundColor: 'rgba(26,172,122,0.08)',
              fill: true,
              tension: 0.4,
              pointRadius: 3,
            },
            {
              label: 'Simple interest',
              data: filteredSimple,
              borderColor: '#888780',
              borderDash: [5, 4],
              backgroundColor: 'transparent',
              fill: false,
              tension: 0,
              pointRadius: 0,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => ' ' + ctx.dataset.label + ': ' + fmt(ctx.parsed.y)
              }
            }
          },
          scales: {
            y: {
              ticks: { callback: (v) => '$' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : v), font: { size: 11 }, color: '#8191a6' },
              grid: { color: 'rgba(129,145,166,0.15)' }
            },
            x: {
              ticks: { font: { size: 11 }, autoSkip: false, maxRotation: 0, color: '#8191a6' },
              grid: { display: false }
            }
          }
        }
      });
    }
  }

  update();
  </script>
</body>
</html>

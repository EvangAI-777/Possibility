<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JASON — JSON Explorer</title>

  <!-- No CDN dependencies — JSON.parse is native -->

  <style>
    :root {
      --bg: #0b0f14;
      --surface: #141a22;
      --surface-hover: #1c2430;
      --border: #2a3140;
      --text: #e2e8f0;
      --text-muted: #8191a6;
      --accent: #5b9cf5;
      --accent-hover: #7db4ff;
      --green: #3fb950;
      --yellow: #d4a017;
      --red: #f04e4e;
      --jason-glow: #e8943e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* -- Upload Screen --------------------------------------------------- */

    .upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .jason-logo {
      width: 120px; height: 120px;
      margin-bottom: 1.5rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .jason-brace {
      font-size: 4rem;
      font-weight: 300;
      color: var(--jason-glow);
      line-height: 1;
      animation: brace-breathe 3s ease-in-out infinite;
      text-shadow: 0 0 20px rgba(232,148,62,0.4);
    }

    .jason-brace.right {
      animation-delay: 0.3s;
    }

    .jason-bracket {
      font-size: 2rem;
      font-weight: 400;
      color: var(--accent);
      margin: 0 2px;
      animation: bracket-float 4s ease-in-out infinite;
    }

    .jason-dot {
      width: 10px; height: 10px;
      background: var(--jason-glow);
      border-radius: 50%;
      margin: 0 4px;
      box-shadow: 0 0 12px var(--jason-glow), 0 0 24px rgba(232,148,62,0.4);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes brace-breathe {
      0%, 100% { text-shadow: 0 0 20px rgba(232,148,62,0.4); transform: scale(1); }
      50% { text-shadow: 0 0 30px rgba(232,148,62,0.6); transform: scale(1.05); }
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 12px var(--jason-glow), 0 0 24px rgba(232,148,62,0.4); }
      50% { box-shadow: 0 0 20px var(--jason-glow), 0 0 40px rgba(232,148,62,0.6); }
    }

    @keyframes bracket-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .upload-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--accent), var(--jason-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .upload-subtitle {
      color: var(--text-muted);
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .drop-zone {
      width: min(90vw, 500px);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--surface);
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--jason-glow);
      background: var(--surface-hover);
      box-shadow: 0 0 30px rgba(232,148,62,0.1);
    }

    .drop-zone-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .drop-zone-label {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .drop-zone-hint {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .file-name-display {
      margin-top: 1.5rem;
      padding: 0.6rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.9rem;
      color: var(--green);
      display: none;
    }

    .file-name-display.visible { display: inline-block; }

    /* -- Loading Screen -------------------------------------------------- */

    .loading-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .loading-screen.active { display: flex; }
    .upload-screen.hidden { display: none; }

    .loading-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: min(90vw, 420px);
    }

    .loading-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: center;
    }

    .loading-step {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 0;
      opacity: 0.3;
      transition: all 0.4s ease;
    }

    .loading-step.active { opacity: 1; }
    .loading-step.done { opacity: 0.7; }

    .step-indicator {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      border: 2px solid var(--border);
      transition: all 0.4s ease;
    }

    .loading-step.active .step-indicator {
      border-color: var(--jason-glow);
      color: var(--jason-glow);
      animation: step-pulse 1s ease-in-out infinite;
    }

    .loading-step.done .step-indicator {
      border-color: var(--green);
      color: var(--green);
      background: rgba(63,185,80,0.1);
    }

    @keyframes step-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232,148,62,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(232,148,62,0); }
    }

    .step-text { font-size: 0.95rem; }
    .step-text .label { font-weight: 600; }
    .step-text .detail { color: var(--text-muted); font-size: 0.8rem; display: block; margin-top: 2px; }

    /* -- Component View -------------------------------------------------- */

    .component-view {
      display: none;
      min-height: 100vh;
    }

    .component-view.active { display: block; }

    .back-pill {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 99999;
      background: rgba(22,27,34,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    .back-pill:hover {
      background: rgba(22,27,34,0.95);
      color: var(--jason-glow);
      border-color: var(--jason-glow);
    }

    .back-pill .jason-dot {
      width: 8px; height: 8px;
      background: var(--jason-glow);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    /* -- Error Display --------------------------------------------------- */

    .error-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .error-screen.active { display: flex; }

    .error-card {
      background: var(--surface);
      border: 1px solid var(--red);
      border-radius: 16px;
      padding: 2.5rem;
      width: min(90vw, 550px);
      text-align: center;
    }

    .error-icon { font-size: 3rem; margin-bottom: 1rem; }

    .error-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 0.5rem;
    }

    .error-message {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      word-break: break-word;
    }

    .error-detail {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.8rem;
      color: var(--red);
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--accent-hover); }

    /* -- JSON Layout ----------------------------------------------------- */

    .json-layout {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      padding-top: 3.5rem;
    }

    /* -- Toolbar --------------------------------------------------------- */

    .json-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.6rem 0.8rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 140px;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.7rem;
      color: var(--text);
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--jason-glow); }

    .toolbar-btn {
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.7rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .toolbar-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .toolbar-btn.active { color: var(--jason-glow); border-color: var(--jason-glow); }

    .view-toggle {
      display: flex;
      gap: 0;
    }

    .view-toggle .toolbar-btn:first-child { border-radius: 6px 0 0 6px; }
    .view-toggle .toolbar-btn:last-child { border-radius: 0 6px 6px 0; border-left: none; }

    /* -- Path Breadcrumb ------------------------------------------------- */

    .path-breadcrumb {
      font-family: 'SFMono-Regular', Consolas, monospace;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      overflow-x: auto;
      white-space: nowrap;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .breadcrumb-segment {
      cursor: pointer;
      transition: color 0.2s;
    }

    .breadcrumb-segment:hover { color: var(--jason-glow); }

    .breadcrumb-separator {
      color: var(--border);
      margin: 0 4px;
    }

    /* -- Tree View ------------------------------------------------------- */

    .json-tree {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .tree-node {
      padding-left: 1.25rem;
      position: relative;
    }

    .tree-node.root { padding-left: 0; }

    .tree-toggle {
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .tree-toggle:hover { color: var(--jason-glow); }

    .tree-toggle::before {
      content: '\25B6';
      font-size: 0.6rem;
      display: inline-block;
      transition: transform 0.15s ease;
      color: var(--text-muted);
      width: 1em;
    }

    .tree-toggle.expanded::before { transform: rotate(90deg); }

    .tree-children { display: none; }
    .tree-children.expanded { display: block; }

    .tree-key { color: var(--jason-glow); }
    .tree-colon { color: var(--text-muted); margin: 0 4px; }

    .tree-value.string { color: var(--green); }
    .tree-value.number { color: var(--accent); }
    .tree-value.boolean { color: var(--yellow); }
    .tree-value.null { color: var(--red); font-style: italic; }

    .tree-bracket { color: var(--text-muted); font-weight: 600; }
    .node-count { color: var(--text-muted); font-size: 0.75rem; margin-left: 4px; }

    .tree-leaf {
      padding-left: 1.25rem;
      display: block;
    }

    /* -- Raw View -------------------------------------------------------- */

    .json-raw {
      display: none;
      font-family: 'SFMono-Regular', Consolas, monospace;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      overflow: auto;
      white-space: pre;
      font-size: 0.875rem;
      line-height: 1.5;
      max-height: 80vh;
    }

    .json-raw.active { display: block; }

    .json-raw .string { color: var(--green); }
    .json-raw .number { color: var(--accent); }
    .json-raw .boolean { color: var(--yellow); }
    .json-raw .null { color: var(--red); font-style: italic; }
    .json-raw .key { color: var(--jason-glow); }

    /* -- Copy Toast ------------------------------------------------------ */

    .copy-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      color: var(--green);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 99999;
      pointer-events: none;
    }

    .copy-toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* -- Responsive ------------------------------------------------------ */

    @media (max-width: 768px) {
      .json-layout { padding: 1rem; padding-top: 3.5rem; }
      .json-toolbar { gap: 0.4rem; }
      .search-input { min-width: 100%; }
    }

    @media (max-width: 480px) {
      .drop-zone { padding: 2rem 1.5rem; }
      .loading-card { padding: 1.5rem; }
      .error-card { padding: 1.5rem; }
    }

    .back-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: var(--accent, #5b9cf5);
      text-decoration: none;
      font-size: 0.85rem;
      z-index: 9999;
      background: var(--bg, #0b0f14);
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--border, #2a3140);
      opacity: 0.7;
      transition: opacity 0.2s;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .back-link:hover { opacity: 1; text-decoration: underline; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">&larr; Possibility</a>

  <!-- -- Upload Screen --------------------------------------------------- -->
  <div id="upload-screen" class="upload-screen">
    <div class="jason-logo">
      <span class="jason-brace">{</span>
      <span class="jason-bracket">[</span>
      <span class="jason-dot"></span>
      <span class="jason-bracket">]</span>
      <span class="jason-brace right">}</span>
    </div>
    <h1 class="upload-title">JASON</h1>
    <p class="upload-subtitle">JSON Explorer</p>
    <div id="drop-zone" class="drop-zone">
      <div class="drop-zone-icon">{ }</div>
      <div class="drop-zone-label">Upload .json File</div>
      <div class="drop-zone-hint">Click to browse or drag and drop a JSON file</div>
      <input type="file" id="file-input" accept=".json">
    </div>
    <div id="file-name" class="file-name-display"></div>
  </div>

  <!-- -- Loading Screen -------------------------------------------------- -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-card">
      <div class="loading-title">Exploring JSON</div>
      <div class="loading-step" id="step-read">
        <div class="step-indicator">📄</div>
        <div class="step-text">
          <span class="label">Reading file</span>
          <span class="detail" id="step-read-detail">Waiting...</span>
        </div>
      </div>
      <div class="loading-step" id="step-parse">
        <div class="step-indicator">⚙️</div>
        <div class="step-text">
          <span class="label">Parsing JSON</span>
          <span class="detail" id="step-parse-detail">Waiting...</span>
        </div>
      </div>
      <div class="loading-step" id="step-render">
        <div class="step-indicator">🌳</div>
        <div class="step-text">
          <span class="label">Rendering tree</span>
          <span class="detail" id="step-render-detail">Waiting...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- -- Error Screen ---------------------------------------------------- -->
  <div id="error-screen" class="error-screen">
    <div class="error-card">
      <div class="error-icon">⚠️</div>
      <div class="error-title">Failed to Parse JSON</div>
      <div class="error-message" id="error-message"></div>
      <div class="error-detail" id="error-detail"></div>
      <button class="btn" onclick="JASON.reset()">↩ Try Another</button>
    </div>
  </div>

  <!-- -- JSON Viewer ----------------------------------------------------- -->
  <div id="component-view" class="component-view">
    <div class="back-pill" onclick="JASON.reset()">
      <span class="jason-dot"></span>
      <span>JASON — Load Another</span>
    </div>
    <div class="json-layout">
      <div class="json-toolbar">
        <input type="text" id="search-input" class="search-input" placeholder="Search keys...">
        <div class="view-toggle">
          <button id="btn-tree-view" class="toolbar-btn active" onclick="JASON.showTreeView()">Tree</button>
          <button id="btn-raw-view" class="toolbar-btn" onclick="JASON.showRawView()">Raw</button>
        </div>
        <button id="btn-expand-all" class="toolbar-btn" onclick="JASON.expandAll()">Expand All</button>
        <button id="btn-collapse-all" class="toolbar-btn" onclick="JASON.collapseAll()">Collapse All</button>
      </div>
      <div id="path-breadcrumb" class="path-breadcrumb">root</div>
      <div id="json-tree" class="json-tree"></div>
      <pre id="json-raw" class="json-raw"><code></code></pre>
    </div>
  </div>

  <div id="copy-toast" class="copy-toast">Copied!</div>

  <!-- -- Engine ---------------------------------------------------------- -->
  <script>
    const JASON = (() => {

      // -- State -----------------------------------------------------------

      let currentData = null;
      let currentPath = [];

      const $ = (id) => document.getElementById(id);

      // -- Screen Management -----------------------------------------------

      function showScreen(name) {
        ['upload-screen', 'loading-screen', 'error-screen', 'component-view'].forEach(id => {
          const el = $(id);
          if (id === name) {
            el.classList.add('active');
            el.classList.remove('hidden');
          } else {
            el.classList.remove('active');
            el.classList.add('hidden');
          }
        });
      }

      function setStep(stepId, state, detail) {
        const step = $(stepId);
        step.classList.remove('active', 'done');
        if (state) step.classList.add(state);
        const detailEl = $(`${stepId}-detail`);
        if (detailEl && detail) detailEl.textContent = detail;
      }

      function resetSteps() {
        ['step-read', 'step-parse', 'step-render'].forEach(id => {
          setStep(id, null, 'Waiting...');
        });
      }

      // -- Helpers ---------------------------------------------------------

      function readFile(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error('Failed to read file'));
          reader.readAsText(file);
        });
      }

      function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
      }

      function showError(message, detail) {
        $('error-message').textContent = message;
        $('error-detail').textContent = detail || 'No additional details';
        showScreen('error-screen');
      }

      // -- Clipboard -------------------------------------------------------

      async function copyToClipboard(text) {
        try {
          await navigator.clipboard.writeText(text);
        } catch (e) {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.style.cssText = 'position:fixed;opacity:0';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
        }
        showCopyToast();
      }

      function showCopyToast() {
        const toast = $('copy-toast');
        toast.classList.add('visible');
        setTimeout(() => toast.classList.remove('visible'), 1500);
      }

      // -- Path Management -------------------------------------------------

      function setPath(pathArray) {
        currentPath = pathArray;
        const breadcrumb = $('path-breadcrumb');
        breadcrumb.innerHTML = '';
        pathArray.forEach((seg, i) => {
          if (i > 0) {
            const sep = document.createElement('span');
            sep.className = 'breadcrumb-separator';
            sep.textContent = '>';
            breadcrumb.appendChild(sep);
          }
          const span = document.createElement('span');
          span.className = 'breadcrumb-segment';
          span.textContent = seg;
          breadcrumb.appendChild(span);
        });
      }

      function getPathString() {
        return currentPath.join('.');
      }

      // -- Search / Filter -------------------------------------------------

      function filterTree(query) {
        const tree = $('json-tree');
        const nodes = tree.querySelectorAll('.tree-node');
        const q = query.toLowerCase();
        if (!q) {
          nodes.forEach(n => n.style.display = '');
          return;
        }
        nodes.forEach(node => {
          const keyEl = node.querySelector(':scope > .tree-toggle > .tree-key, :scope > .tree-leaf > .tree-key');
          if (keyEl) {
            const match = keyEl.textContent.toLowerCase().includes(q);
            node.style.display = match ? '' : 'none';
            if (match) {
              // Show all ancestors
              let parent = node.parentElement;
              while (parent && parent !== tree) {
                parent.style.display = '';
                if (parent.classList.contains('tree-children')) {
                  parent.classList.add('expanded');
                  const toggle = parent.previousElementSibling;
                  if (toggle && toggle.classList.contains('tree-toggle')) {
                    toggle.classList.add('expanded');
                  }
                }
                parent = parent.parentElement;
              }
            }
          }
        });
      }

      // -- Tree Rendering --------------------------------------------------

      function renderTree(data) {
        const tree = $('json-tree');
        tree.innerHTML = '';
        buildNode(null, data, tree, 0, ['root']);
      }

      function buildNode(key, value, container, depth, path) {
        const type = Array.isArray(value) ? 'array' : typeof value;

        if (value !== null && type === 'object' || type === 'array') {
          const isArray = Array.isArray(value);
          const node = document.createElement('div');
          node.className = depth === 0 ? 'tree-node root' : 'tree-node';

          const toggle = document.createElement('span');
          toggle.className = 'tree-toggle' + (depth < 2 ? ' expanded' : '');

          if (key !== null) {
            const keySpan = document.createElement('span');
            keySpan.className = 'tree-key';
            keySpan.textContent = isArray ? key : `"${key}"`;
            keySpan.addEventListener('click', (e) => {
              e.stopPropagation();
              copyToClipboard(String(key));
            });
            const colon = document.createElement('span');
            colon.className = 'tree-colon';
            colon.textContent = ':';
            toggle.appendChild(keySpan);
            toggle.appendChild(colon);
          }

          const bracket = document.createElement('span');
          bracket.className = 'tree-bracket';
          bracket.textContent = isArray ? '[' : '{';
          toggle.appendChild(bracket);

          const count = document.createElement('span');
          count.className = 'node-count';
          const entries = isArray ? value.length : Object.keys(value).length;
          count.textContent = isArray ? `${entries} items` : `${entries} keys`;
          toggle.appendChild(count);

          const children = document.createElement('div');
          children.className = 'tree-children' + (depth < 2 ? ' expanded' : '');

          toggle.addEventListener('click', (e) => {
            e.stopPropagation();
            toggle.classList.toggle('expanded');
            children.classList.toggle('expanded');
            setPath(path);
          });

          node.appendChild(toggle);
          node.appendChild(children);

          const entries2 = isArray ? value.map((v, i) => [i, v]) : Object.entries(value);
          entries2.forEach(([k, v]) => {
            buildNode(k, v, children, depth + 1, [...path, String(k)]);
          });

          const closeBracket = document.createElement('span');
          closeBracket.className = 'tree-bracket';
          closeBracket.textContent = isArray ? ']' : '}';
          closeBracket.style.paddingLeft = '1.25rem';
          children.appendChild(closeBracket);

          container.appendChild(node);
        } else {
          const node = document.createElement('div');
          node.className = 'tree-node';

          const leaf = document.createElement('span');
          leaf.className = 'tree-leaf';

          if (key !== null) {
            const keySpan = document.createElement('span');
            keySpan.className = 'tree-key';
            keySpan.textContent = typeof key === 'number' ? key : `"${key}"`;
            keySpan.style.cursor = 'pointer';
            keySpan.addEventListener('click', (e) => {
              e.stopPropagation();
              copyToClipboard(String(key));
            });
            const colon = document.createElement('span');
            colon.className = 'tree-colon';
            colon.textContent = ':';
            leaf.appendChild(keySpan);
            leaf.appendChild(colon);
          }

          const valSpan = document.createElement('span');
          let valType = value === null ? 'null' : typeof value;
          valSpan.className = `tree-value ${valType}`;
          valSpan.textContent = value === null ? 'null' : typeof value === 'string' ? `"${value}"` : String(value);
          valSpan.style.cursor = 'pointer';
          valSpan.addEventListener('click', (e) => {
            e.stopPropagation();
            copyToClipboard(value === null ? 'null' : String(value));
            setPath([...path]);
          });
          leaf.appendChild(valSpan);

          node.appendChild(leaf);
          container.appendChild(node);
        }
      }

      // -- Expand / Collapse All -------------------------------------------

      function expandAll() {
        $('json-tree').querySelectorAll('.tree-toggle').forEach(t => t.classList.add('expanded'));
        $('json-tree').querySelectorAll('.tree-children').forEach(c => c.classList.add('expanded'));
      }

      function collapseAll() {
        $('json-tree').querySelectorAll('.tree-toggle').forEach(t => t.classList.remove('expanded'));
        $('json-tree').querySelectorAll('.tree-children').forEach(c => c.classList.remove('expanded'));
      }

      // -- Raw View --------------------------------------------------------

      function renderRaw(data) {
        const raw = $('json-raw');
        const jsonStr = JSON.stringify(data, null, 2);
        raw.querySelector('code').innerHTML = syntaxHighlight(jsonStr);
      }

      function syntaxHighlight(json) {
        json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return json.replace(
          /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
          function (match) {
            let cls = 'number';
            if (/^"/.test(match)) {
              if (/:$/.test(match)) {
                cls = 'key';
                match = match.replace(/:$/, '');
                return '<span class="' + cls + '">' + match + '</span>:';
              } else {
                cls = 'string';
              }
            } else if (/true|false/.test(match)) {
              cls = 'boolean';
            } else if (/null/.test(match)) {
              cls = 'null';
            }
            return '<span class="' + cls + '">' + match + '</span>';
          }
        );
      }

      // -- View Toggle -----------------------------------------------------

      function showTreeView() {
        $('json-tree').style.display = '';
        $('json-raw').classList.remove('active');
        $('btn-tree-view').classList.add('active');
        $('btn-raw-view').classList.remove('active');
      }

      function showRawView() {
        $('json-tree').style.display = 'none';
        $('json-raw').classList.add('active');
        $('btn-tree-view').classList.remove('active');
        $('btn-raw-view').classList.add('active');
      }

      // -- Deployment Pipeline ---------------------------------------------

      async function deploy(file) {
        showScreen('loading-screen');
        resetSteps();

        try {
          // Step 1: Read file
          setStep('step-read', 'active', `Reading ${file.name}...`);
          const text = await readFile(file);
          await delay(300);
          setStep('step-read', 'done', `${file.name} (${(text.length / 1024).toFixed(1)} KB)`);

          // Step 2: Parse JSON
          setStep('step-parse', 'active', 'Parsing JSON...');
          const data = JSON.parse(text);
          await delay(300);
          const type = Array.isArray(data) ? 'array' : typeof data;
          const count = type === 'array' ? data.length + ' items' : (type === 'object' ? Object.keys(data).length + ' keys' : type);
          setStep('step-parse', 'done', `Parsed: ${count}`);

          // Step 3: Render tree
          setStep('step-render', 'active', 'Building tree view...');
          currentData = data;
          renderTree(data);
          renderRaw(data);
          await delay(300);
          setStep('step-render', 'done', 'Tree rendered');

          await delay(400);
          setPath(['root']);
          showScreen('component-view');
          window.scrollTo(0, 0);

        } catch (err) {
          showError(err.message, err.stack || '');
        }
      }

      // -- Public API ------------------------------------------------------

      function reset() {
        currentData = null;
        currentPath = [];
        $('json-tree').innerHTML = '';
        $('json-raw').querySelector('code').innerHTML = '';
        $('path-breadcrumb').textContent = 'root';
        $('search-input').value = '';
        $('json-tree').style.display = '';
        $('json-raw').classList.remove('active');
        $('btn-tree-view').classList.add('active');
        $('btn-raw-view').classList.remove('active');
        $('file-input').value = '';
        $('file-name').classList.remove('visible');
        showScreen('upload-screen');
      }

      return { deploy, reset, showTreeView, showRawView, expandAll, collapseAll };
    })();

    // -- Event Wiring ---------------------------------------------------- //

    document.addEventListener('DOMContentLoaded', () => {
      const fileInput = document.getElementById('file-input');
      const dropZone = document.getElementById('drop-zone');
      const fileNameDisplay = document.getElementById('file-name');
      const searchInput = document.getElementById('search-input');

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          fileNameDisplay.textContent = file.name;
          fileNameDisplay.classList.add('visible');
          setTimeout(() => JASON.deploy(file), 300);
        }
      });

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) {
          fileNameDisplay.textContent = file.name;
          fileNameDisplay.classList.add('visible');
          setTimeout(() => JASON.deploy(file), 300);
        }
      });

      searchInput.addEventListener('input', (e) => {
        JASON.expandAll();
        const tree = document.getElementById('json-tree');
        const nodes = tree.querySelectorAll('.tree-node');
        const q = e.target.value.toLowerCase();
        if (!q) {
          nodes.forEach(n => n.style.display = '');
          return;
        }
        nodes.forEach(node => {
          const keyEl = node.querySelector(':scope > .tree-toggle > .tree-key, :scope > .tree-leaf > .tree-key');
          if (keyEl) {
            const match = keyEl.textContent.toLowerCase().includes(q);
            node.style.display = match ? '' : 'none';
            if (match) {
              let parent = node.parentElement;
              while (parent && parent !== tree) {
                parent.style.display = '';
                if (parent.classList.contains('tree-children')) {
                  parent.classList.add('expanded');
                }
                parent = parent.parentElement;
              }
            }
          }
        });
      });
    });
  </script>

</body>
</html>

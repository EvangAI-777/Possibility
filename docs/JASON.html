<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JASON — JSON Explorer</title>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --jason-glow: #f0883e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Upload Screen ─────────────────────────────────────────────────── */

    .upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .jason-logo {
      width: 120px; height: 120px;
      margin-bottom: 1.5rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .jason-brace {
      font-size: 4rem;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-weight: 700;
      color: var(--jason-glow);
      line-height: 1;
      position: relative;
    }

    .jason-brace-left {
      text-shadow: 0 0 20px rgba(240,136,62,0.5), 0 0 40px rgba(240,136,62,0.2);
      animation: brace-bob 3s ease-in-out infinite;
    }

    .jason-brace-right {
      text-shadow: 0 0 20px rgba(240,136,62,0.5), 0 0 40px rgba(240,136,62,0.2);
      animation: brace-bob 3s ease-in-out infinite 0.3s;
    }

    .jason-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 2px;
      gap: 3px;
    }

    .jason-bracket {
      font-size: 1.2rem;
      font-family: 'SFMono-Regular', Consolas, monospace;
      color: var(--accent);
      opacity: 0.7;
    }

    .jason-dot {
      width: 8px; height: 8px;
      background: var(--jason-glow);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--jason-glow), 0 0 24px rgba(240,136,62,0.4);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes brace-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 12px var(--jason-glow), 0 0 24px rgba(240,136,62,0.4); }
      50% { box-shadow: 0 0 20px var(--jason-glow), 0 0 40px rgba(240,136,62,0.6); }
    }

    .upload-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--jason-glow), var(--yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .upload-subtitle {
      color: var(--text-muted);
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .drop-zone {
      width: min(90vw, 500px);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--surface);
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--jason-glow);
      background: var(--surface-hover);
      box-shadow: 0 0 30px rgba(240,136,62,0.1);
    }

    .drop-zone-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .drop-zone-label {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .drop-zone-hint {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .file-name-display {
      margin-top: 1.5rem;
      padding: 0.6rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.9rem;
      color: var(--green);
      display: none;
    }

    .file-name-display.visible { display: inline-block; }

    /* ── Loading Screen ────────────────────────────────────────────────── */

    .loading-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .loading-screen.active { display: flex; }
    .upload-screen.hidden { display: none; }

    .loading-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: min(90vw, 420px);
    }

    .loading-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: center;
    }

    .loading-step {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 0;
      opacity: 0.3;
      transition: all 0.4s ease;
    }

    .loading-step.active { opacity: 1; }
    .loading-step.done { opacity: 0.7; }

    .step-indicator {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      border: 2px solid var(--border);
      transition: all 0.4s ease;
    }

    .loading-step.active .step-indicator {
      border-color: var(--jason-glow);
      color: var(--jason-glow);
      animation: step-pulse 1s ease-in-out infinite;
    }

    .loading-step.done .step-indicator {
      border-color: var(--green);
      color: var(--green);
      background: rgba(63,185,80,0.1);
    }

    @keyframes step-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(240,136,62,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(240,136,62,0); }
    }

    .step-text { font-size: 0.95rem; }
    .step-text .label { font-weight: 600; }
    .step-text .detail { color: var(--text-muted); font-size: 0.8rem; display: block; margin-top: 2px; }

    /* ── Component View ────────────────────────────────────────────────── */

    .component-view {
      display: none;
      min-height: 100vh;
    }

    .component-view.active { display: block; }

    .back-pill {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 99999;
      background: rgba(22,27,34,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    .back-pill:hover {
      background: rgba(22,27,34,0.95);
      color: var(--jason-glow);
      border-color: var(--jason-glow);
    }

    .back-pill .jason-pill-dot {
      width: 8px; height: 8px;
      background: var(--jason-glow);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    /* ── Error Display ─────────────────────────────────────────────────── */

    .error-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .error-screen.active { display: flex; }

    .error-card {
      background: var(--surface);
      border: 1px solid var(--red);
      border-radius: 16px;
      padding: 2.5rem;
      width: min(90vw, 550px);
      text-align: center;
    }

    .error-icon { font-size: 3rem; margin-bottom: 1rem; }

    .error-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 0.5rem;
    }

    .error-message {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      word-break: break-word;
    }

    .error-detail {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.8rem;
      color: var(--red);
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--accent-hover); }

    /* ── JSON Viewer Layout ────────────────────────────────────────────── */

    .json-toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      padding-left: 160px;
    }

    .json-search {
      flex: 1;
      min-width: 150px;
      padding: 0.4rem 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: 'SFMono-Regular', Consolas, monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    .json-search:focus {
      border-color: var(--jason-glow);
    }

    .json-search::placeholder {
      color: var(--text-muted);
    }

    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .view-toggle button {
      padding: 0.4rem 0.8rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    .view-toggle button.active {
      background: var(--jason-glow);
      color: #fff;
    }

    .view-toggle button:not(.active):hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .json-path-breadcrumb {
      width: 100%;
      padding: 0.3rem 0;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .json-path-breadcrumb span {
      color: var(--jason-glow);
    }

    .json-stats {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Tree View ─────────────────────────────────────────────────────── */

    .json-tree-container {
      padding: 1.5rem;
      overflow-x: auto;
    }

    .json-tree-container.hidden { display: none; }

    .json-node {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .json-node .json-key {
      color: var(--jason-glow);
      cursor: default;
    }

    .json-node .json-string { color: var(--green); }
    .json-node .json-number { color: var(--accent); }
    .json-node .json-boolean { color: var(--yellow); }
    .json-node .json-null { color: var(--red); opacity: 0.7; }

    .json-node .json-bracket {
      color: var(--text-muted);
    }

    .json-node .json-comma {
      color: var(--text-muted);
    }

    .json-toggle {
      cursor: pointer;
      user-select: none;
      display: inline-block;
      width: 1em;
      text-align: center;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .json-toggle:hover {
      color: var(--jason-glow);
    }

    .json-children {
      padding-left: 1.5em;
    }

    .json-children.collapsed {
      display: none;
    }

    .json-count {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-style: italic;
      margin-left: 0.5em;
    }

    .json-line {
      padding: 1px 0;
      border-radius: 3px;
      transition: background 0.15s;
    }

    .json-line:hover {
      background: var(--surface-hover);
    }

    .json-line.highlighted {
      background: rgba(240,136,62,0.15);
    }

    .json-copyable {
      cursor: pointer;
      position: relative;
    }

    .json-copyable:hover::after {
      content: 'Click to copy';
      position: absolute;
      top: -1.5em;
      left: 0;
      font-size: 0.65rem;
      color: var(--text-muted);
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Raw View ──────────────────────────────────────────────────────── */

    .json-raw-container {
      padding: 1.5rem;
      display: none;
    }

    .json-raw-container.visible { display: block; }

    .json-raw-output {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.875rem;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre;
      color: var(--text);
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }

    /* ── Responsive ────────────────────────────────────────────────────── */

    @media (max-width: 768px) {
      .json-toolbar {
        padding-left: 1.5rem;
        padding-top: 3rem;
      }
    }

    @media (max-width: 480px) {
      .drop-zone { padding: 2rem 1.5rem; }
      .loading-card { padding: 1.5rem; }
      .error-card { padding: 1.5rem; }
    }

    .back-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: var(--accent, #58a6ff);
      text-decoration: none;
      font-size: 0.85rem;
      z-index: 9999;
      background: var(--bg, #0d1117);
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--border, #30363d);
      opacity: 0.7;
      transition: opacity 0.2s;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .back-link:hover { opacity: 1; text-decoration: underline; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">&larr; Possibility</a>

  <!-- ── Upload Screen ─────────────────────────────────────────────────── -->
  <div id="upload-screen" class="upload-screen">
    <div class="jason-logo">
      <span class="jason-brace jason-brace-left">{</span>
      <div class="jason-inner">
        <span class="jason-bracket">[ ]</span>
        <div class="jason-dot"></div>
      </div>
      <span class="jason-brace jason-brace-right">}</span>
    </div>
    <h1 class="upload-title">JASON</h1>
    <p class="upload-subtitle">JSON Explorer</p>
    <div id="drop-zone" class="drop-zone">
      <div class="drop-zone-icon">{ }</div>
      <div class="drop-zone-label">Upload .json File</div>
      <div class="drop-zone-hint">Click to browse or drag and drop a JSON file</div>
      <input type="file" id="file-input" accept=".json">
    </div>
    <div id="file-name" class="file-name-display"></div>
  </div>

  <!-- ── Loading Screen ────────────────────────────────────────────────── -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-card">
      <div class="loading-title">Exploring JSON</div>
      <div class="loading-step" id="step-read">
        <div class="step-indicator">📄</div>
        <div class="step-text">
          <span class="label">Reading file</span>
          <span class="detail" id="step-read-detail">Waiting...</span>
        </div>
      </div>
      <div class="loading-step" id="step-parse">
        <div class="step-indicator">⚙️</div>
        <div class="step-text">
          <span class="label">Parsing JSON</span>
          <span class="detail" id="step-parse-detail">Waiting...</span>
        </div>
      </div>
      <div class="loading-step" id="step-render">
        <div class="step-indicator">🌳</div>
        <div class="step-text">
          <span class="label">Rendering tree</span>
          <span class="detail" id="step-render-detail">Waiting...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Error Screen ──────────────────────────────────────────────────── -->
  <div id="error-screen" class="error-screen">
    <div class="error-card">
      <div class="error-icon">⚠️</div>
      <div class="error-title">Failed to Parse JSON</div>
      <div class="error-message" id="error-message"></div>
      <div class="error-detail" id="error-detail"></div>
      <button class="btn" onclick="JASON.reset()">↩ Try Another</button>
    </div>
  </div>

  <!-- ── JSON Viewer Target ────────────────────────────────────────────── -->
  <div id="component-view" class="component-view">
    <div class="back-pill" onclick="JASON.reset()">
      <span class="jason-pill-dot"></span>
      <span>JASON — Load Another</span>
    </div>
    <div class="json-toolbar">
      <input type="text" class="json-search" id="json-search" placeholder="Search keys...">
      <div class="view-toggle">
        <button id="btn-tree" class="active" onclick="JASON.setView('tree')">Tree</button>
        <button id="btn-raw" onclick="JASON.setView('raw')">Raw</button>
      </div>
      <div class="json-stats" id="json-stats"></div>
      <div class="json-path-breadcrumb" id="json-path">
        <span>root</span>
      </div>
    </div>
    <div id="json-tree" class="json-tree-container"></div>
    <div id="json-raw" class="json-raw-container">
      <pre class="json-raw-output" id="json-raw-output"></pre>
    </div>
  </div>

  <!-- ── Engine ────────────────────────────────────────────────────────── -->
  <script>
    const JASON = (() => {

      // ── State ──────────────────────────────────────────────────────────

      let parsedData = null;
      let currentPath = ['root'];

      const $ = (id) => document.getElementById(id);

      // ── Screen Management ──────────────────────────────────────────────

      function showScreen(name) {
        ['upload-screen', 'loading-screen', 'error-screen', 'component-view'].forEach(id => {
          const el = $(id);
          if (id === name) {
            el.classList.add('active');
            el.classList.remove('hidden');
          } else {
            el.classList.remove('active');
            el.classList.add('hidden');
          }
        });
      }

      function setStep(stepId, state, detail) {
        const step = $(stepId);
        step.classList.remove('active', 'done');
        if (state) step.classList.add(state);
        const detailEl = $(`${stepId}-detail`);
        if (detailEl && detail) detailEl.textContent = detail;
      }

      function resetSteps() {
        ['step-read', 'step-parse', 'step-render'].forEach(id => {
          setStep(id, null, 'Waiting...');
        });
      }

      // ── Tree Rendering ─────────────────────────────────────────────────

      function renderTree(data, container) {
        container.innerHTML = '';
        const tree = buildNode(data, '', true);
        container.appendChild(tree);
      }

      function buildNode(value, key, isLast) {
        const type = getType(value);
        const line = document.createElement('div');
        line.className = 'json-line';

        if (type === 'object' || type === 'array') {
          const isObj = type === 'object';
          const entries = isObj ? Object.entries(value) : value.map((v, i) => [i, v]);
          const openBracket = isObj ? '{' : '[';
          const closeBracket = isObj ? '}' : ']';

          // Toggle arrow
          const toggle = document.createElement('span');
          toggle.className = 'json-toggle';
          toggle.textContent = '▼';
          line.appendChild(toggle);

          // Key (if present)
          if (key !== '') {
            const keySpan = document.createElement('span');
            keySpan.className = 'json-key json-copyable';
            keySpan.textContent = `"${key}"`;
            keySpan.addEventListener('click', () => copyToClipboard(key));
            line.appendChild(keySpan);
            line.appendChild(document.createTextNode(': '));
          }

          // Open bracket + count
          const bracketSpan = document.createElement('span');
          bracketSpan.className = 'json-bracket';
          bracketSpan.textContent = openBracket;
          line.appendChild(bracketSpan);

          const countSpan = document.createElement('span');
          countSpan.className = 'json-count';
          countSpan.textContent = isObj ? `${entries.length} keys` : `${entries.length} items`;
          line.appendChild(countSpan);

          // Children container
          const children = document.createElement('div');
          children.className = 'json-children';

          entries.forEach(([k, v], idx) => {
            const childNode = buildNode(v, k, idx === entries.length - 1);
            children.appendChild(childNode);
          });

          // Close bracket line
          const closeLine = document.createElement('div');
          closeLine.className = 'json-line';
          const closeSpan = document.createElement('span');
          closeSpan.className = 'json-bracket';
          closeSpan.textContent = closeBracket;
          closeLine.appendChild(closeSpan);
          if (!isLast) {
            const comma = document.createElement('span');
            comma.className = 'json-comma';
            comma.textContent = ',';
            closeLine.appendChild(comma);
          }

          // Toggle behavior
          toggle.addEventListener('click', () => {
            const collapsed = children.classList.toggle('collapsed');
            toggle.textContent = collapsed ? '▶' : '▼';
            countSpan.style.display = collapsed ? 'inline' : 'inline';
          });

          const wrapper = document.createElement('div');
          wrapper.className = 'json-node';
          wrapper.appendChild(line);
          wrapper.appendChild(children);
          wrapper.appendChild(closeLine);
          return wrapper;
        }

        // Primitive values
        if (key !== '') {
          const keySpan = document.createElement('span');
          keySpan.className = 'json-key json-copyable';
          keySpan.textContent = typeof key === 'number' ? '' : `"${key}"`;
          if (typeof key !== 'number') {
            keySpan.addEventListener('click', () => copyToClipboard(key));
            line.appendChild(keySpan);
            line.appendChild(document.createTextNode(': '));
          }
        }

        const valSpan = document.createElement('span');
        valSpan.className = `json-${type} json-copyable`;
        valSpan.textContent = type === 'string' ? `"${value}"` : String(value);
        valSpan.addEventListener('click', () => copyToClipboard(String(value)));
        line.appendChild(valSpan);

        if (!isLast) {
          const comma = document.createElement('span');
          comma.className = 'json-comma';
          comma.textContent = ',';
          line.appendChild(comma);
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'json-node';
        wrapper.appendChild(line);
        return wrapper;
      }

      function getType(value) {
        if (value === null) return 'null';
        if (Array.isArray(value)) return 'array';
        return typeof value;
      }

      // ── Raw View Rendering ─────────────────────────────────────────────

      function renderRaw(data) {
        const output = $('json-raw-output');
        output.textContent = JSON.stringify(data, null, 2);
      }

      // ── Search/Filter ──────────────────────────────────────────────────

      function filterTree(query) {
        const container = $('json-tree');
        const lines = container.querySelectorAll('.json-line');
        lines.forEach(line => {
          line.classList.remove('highlighted');
          if (query) {
            const text = line.textContent.toLowerCase();
            if (text.includes(query.toLowerCase())) {
              line.classList.add('highlighted');
              // Expand parent nodes
              let parent = line.parentElement;
              while (parent && parent !== container) {
                if (parent.classList.contains('json-children') && parent.classList.contains('collapsed')) {
                  parent.classList.remove('collapsed');
                  const toggle = parent.previousElementSibling?.querySelector('.json-toggle');
                  if (toggle) toggle.textContent = '▼';
                }
                parent = parent.parentElement;
              }
            }
          }
        });
      }

      // ── View Toggle ────────────────────────────────────────────────────

      function setView(mode) {
        const treeContainer = $('json-tree');
        const rawContainer = $('json-raw');
        const btnTree = $('btn-tree');
        const btnRaw = $('btn-raw');

        if (mode === 'tree') {
          treeContainer.classList.remove('hidden');
          rawContainer.classList.remove('visible');
          btnTree.classList.add('active');
          btnRaw.classList.remove('active');
        } else {
          treeContainer.classList.add('hidden');
          rawContainer.classList.add('visible');
          btnTree.classList.remove('active');
          btnRaw.classList.add('active');
        }
      }

      // ── Stats ──────────────────────────────────────────────────────────

      function computeStats(data) {
        let keys = 0, values = 0, depth = 0;
        function walk(val, d) {
          if (d > depth) depth = d;
          if (val && typeof val === 'object') {
            const entries = Array.isArray(val) ? val : Object.values(val);
            if (!Array.isArray(val)) keys += Object.keys(val).length;
            entries.forEach(v => walk(v, d + 1));
          } else {
            values++;
          }
        }
        walk(data, 0);
        return { keys, values, depth };
      }

      // ── Clipboard ──────────────────────────────────────────────────────

      function copyToClipboard(text) {
        try {
          navigator.clipboard.writeText(text);
        } catch (e) {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.style.cssText = 'position:fixed;opacity:0';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
        }
      }

      // ── Deployment Pipeline ────────────────────────────────────────────

      async function deploy(file) {
        showScreen('loading-screen');
        resetSteps();

        try {
          // Step 1: Read file
          setStep('step-read', 'active', `Reading ${file.name}...`);
          const text = await readFile(file);
          await delay(300);
          setStep('step-read', 'done', `${file.name} (${(text.length / 1024).toFixed(1)} KB)`);

          // Step 2: Parse JSON
          setStep('step-parse', 'active', 'Parsing JSON...');
          await delay(200);
          try {
            parsedData = JSON.parse(text);
          } catch (parseErr) {
            throw new Error(`Invalid JSON:\n${parseErr.message}`);
          }
          await delay(300);
          setStep('step-parse', 'done', 'JSON parsed successfully');

          // Step 3: Render
          setStep('step-render', 'active', 'Building tree view...');
          await delay(200);

          renderTree(parsedData, $('json-tree'));
          renderRaw(parsedData);

          const stats = computeStats(parsedData);
          $('json-stats').textContent = `${stats.keys} keys · ${stats.values} values · depth ${stats.depth}`;

          currentPath = ['root'];
          $('json-path').innerHTML = '<span>root</span>';

          await delay(300);
          setStep('step-render', 'done', 'Tree rendered');

          await delay(400);
          showScreen('component-view');
          setView('tree');

        } catch (err) {
          showError(err.message, err.stack || '');
        }
      }

      // ── Helpers ────────────────────────────────────────────────────────

      function readFile(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error('Failed to read file'));
          reader.readAsText(file);
        });
      }

      function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
      }

      function showError(message, detail) {
        $('error-message').textContent = message;
        $('error-detail').textContent = detail || 'No additional details';
        showScreen('error-screen');
      }

      // ── Public API ─────────────────────────────────────────────────────

      function reset() {
        parsedData = null;
        currentPath = ['root'];
        $('json-tree').innerHTML = '';
        $('json-raw-output').textContent = '';
        $('json-search').value = '';
        $('json-stats').textContent = '';
        $('json-path').innerHTML = '<span>root</span>';
        $('file-input').value = '';
        $('file-name').classList.remove('visible');
        showScreen('upload-screen');
      }

      return { deploy, reset, setView };
    })();

    // ── Event Wiring ──────────────────────────────────────────────────── //

    document.addEventListener('DOMContentLoaded', () => {
      const fileInput = document.getElementById('file-input');
      const dropZone = document.getElementById('drop-zone');
      const fileNameDisplay = document.getElementById('file-name');
      const searchInput = document.getElementById('json-search');

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          fileNameDisplay.textContent = file.name;
          fileNameDisplay.classList.add('visible');
          setTimeout(() => JASON.deploy(file), 300);
        }
      });

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) {
          fileNameDisplay.textContent = file.name;
          fileNameDisplay.classList.add('visible');
          setTimeout(() => JASON.deploy(file), 300);
        }
      });

      let searchTimeout;
      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          const query = e.target.value.trim();
          // Filter is only available in tree view
          const treeContainer = document.getElementById('json-tree');
          if (!treeContainer.classList.contains('hidden')) {
            JASON._filterTree(query);
          }
        }, 200);
      });
    });

    // Expose filterTree for internal use
    JASON._filterTree = (() => {
      const container = () => document.getElementById('json-tree');
      return (query) => {
        const lines = container().querySelectorAll('.json-line');
        lines.forEach(line => {
          line.classList.remove('highlighted');
          if (query) {
            const text = line.textContent.toLowerCase();
            if (text.includes(query.toLowerCase())) {
              line.classList.add('highlighted');
              let parent = line.parentElement;
              while (parent && parent !== container()) {
                if (parent.classList.contains('json-children') && parent.classList.contains('collapsed')) {
                  parent.classList.remove('collapsed');
                  const toggle = parent.previousElementSibling?.querySelector('.json-toggle');
                  if (toggle) toggle.textContent = '▼';
                }
                parent = parent.parentElement;
              }
            }
          }
        });
      };
    })();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARKER — Markdown Viewer & Renderer</title>

  <!-- ── CDN Dependencies ──────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --marker-glow: #a78bfa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Upload Screen ─────────────────────────────────────────────────── */

    .upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .marker-logo {
      width: 120px; height: 120px;
      margin-bottom: 1.5rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .marker-pen {
      width: 32px; height: 90px;
      position: relative;
      transform: rotate(-30deg);
      animation: gentle-bob 3s ease-in-out infinite;
    }

    .marker-body {
      width: 32px; height: 60px;
      background: linear-gradient(180deg, var(--accent), var(--marker-glow));
      border-radius: 6px 6px 2px 2px;
      position: absolute;
      top: 0;
    }

    .marker-grip {
      width: 32px; height: 12px;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      position: absolute;
      top: 60px;
    }

    .marker-tip {
      width: 0; height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 18px solid var(--surface-hover);
      position: absolute;
      top: 72px;
    }

    .marker-tip::after {
      content: '';
      position: absolute;
      bottom: 10px; left: -4px;
      width: 8px; height: 8px;
      background: var(--marker-glow);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--marker-glow), 0 0 24px rgba(167,139,250,0.4);
      animation: pulse-tip 2s ease-in-out infinite;
    }

    .marker-stroke {
      position: absolute;
      bottom: -8px; right: -35px;
      width: 60px; height: 30px;
    }

    .marker-stroke svg {
      width: 60px; height: 30px;
      overflow: visible;
    }

    .marker-stroke svg path {
      stroke: var(--marker-glow);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 70;
      stroke-dashoffset: 70;
      animation: write-stroke 3s ease-in-out infinite;
      filter: drop-shadow(0 0 4px rgba(167,139,250,0.5));
    }

    @keyframes gentle-bob {
      0%, 100% { transform: rotate(-30deg) translateY(0); }
      50% { transform: rotate(-30deg) translateY(-3px); }
    }

    @keyframes pulse-tip {
      0%, 100% { box-shadow: 0 0 12px var(--marker-glow), 0 0 24px rgba(167,139,250,0.4); }
      50% { box-shadow: 0 0 20px var(--marker-glow), 0 0 40px rgba(167,139,250,0.6); }
    }

    @keyframes write-stroke {
      0% { stroke-dashoffset: 70; }
      40% { stroke-dashoffset: 0; }
      60% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -70; }
    }

    .upload-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--accent), var(--marker-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .upload-subtitle {
      color: var(--text-muted);
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .drop-zone {
      width: min(90vw, 500px);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--surface);
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--marker-glow);
      background: var(--surface-hover);
      box-shadow: 0 0 30px rgba(167,139,250,0.1);
    }

    .drop-zone-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .drop-zone-label {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .drop-zone-hint {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .file-name-display {
      margin-top: 1.5rem;
      padding: 0.6rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.9rem;
      color: var(--green);
      display: none;
    }

    .file-name-display.visible { display: inline-block; }

    /* ── Loading Screen ────────────────────────────────────────────────── */

    .loading-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .loading-screen.active { display: flex; }
    .upload-screen.hidden { display: none; }

    .loading-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: min(90vw, 420px);
    }

    .loading-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: center;
    }

    .loading-step {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 0;
      opacity: 0.3;
      transition: all 0.4s ease;
    }

    .loading-step.active { opacity: 1; }
    .loading-step.done { opacity: 0.7; }

    .step-indicator {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      border: 2px solid var(--border);
      transition: all 0.4s ease;
    }

    .loading-step.active .step-indicator {
      border-color: var(--marker-glow);
      color: var(--marker-glow);
      animation: step-pulse 1s ease-in-out infinite;
    }

    .loading-step.done .step-indicator {
      border-color: var(--green);
      color: var(--green);
      background: rgba(63,185,80,0.1);
    }

    @keyframes step-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(167,139,250,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(167,139,250,0); }
    }

    .step-text { font-size: 0.95rem; }
    .step-text .label { font-weight: 600; }
    .step-text .detail { color: var(--text-muted); font-size: 0.8rem; display: block; margin-top: 2px; }

    /* ── Component View ────────────────────────────────────────────────── */

    .component-view {
      display: none;
      min-height: 100vh;
    }

    .component-view.active { display: block; }

    .back-pill {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 99999;
      background: rgba(22,27,34,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    .back-pill:hover {
      background: rgba(22,27,34,0.95);
      color: var(--marker-glow);
      border-color: var(--marker-glow);
    }

    .back-pill .marker-dot {
      width: 8px; height: 8px;
      background: var(--marker-glow);
      border-radius: 50%;
      animation: pulse-tip 2s ease-in-out infinite;
    }

    /* ── Error Display ─────────────────────────────────────────────────── */

    .error-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .error-screen.active { display: flex; }

    .error-card {
      background: var(--surface);
      border: 1px solid var(--red);
      border-radius: 16px;
      padding: 2.5rem;
      width: min(90vw, 550px);
      text-align: center;
    }

    .error-icon { font-size: 3rem; margin-bottom: 1rem; }

    .error-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 0.5rem;
    }

    .error-message {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      word-break: break-word;
    }

    .error-detail {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.8rem;
      color: var(--red);
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--accent-hover); }

    /* ── Markdown Layout ───────────────────────────────────────────────── */

    .markdown-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      gap: 2rem;
      padding-top: 3.5rem;
    }

    /* ── TOC Sidebar ───────────────────────────────────────────────────── */

    .toc-sidebar {
      position: sticky;
      top: 3.5rem;
      max-height: calc(100vh - 4rem);
      overflow-y: auto;
      padding-right: 1rem;
      border-right: 1px solid var(--border);
    }

    .toc-sidebar::-webkit-scrollbar { width: 4px; }
    .toc-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .toc-sidebar.hidden { display: none; }

    .toc-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .toc-list {
      list-style: none;
    }

    .toc-list li {
      margin: 0;
    }

    .toc-link {
      display: block;
      padding: 0.3rem 0 0.3rem 0;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.82rem;
      line-height: 1.4;
      border-left: 2px solid transparent;
      padding-left: 0.75rem;
      transition: all 0.2s;
    }

    .toc-link:hover {
      color: var(--accent);
    }

    .toc-link.active {
      color: var(--marker-glow);
      border-left-color: var(--marker-glow);
    }

    .toc-link[data-level="2"] { padding-left: 0.75rem; }
    .toc-link[data-level="3"] { padding-left: 1.5rem; font-size: 0.78rem; }
    .toc-link[data-level="4"] { padding-left: 2.25rem; font-size: 0.75rem; }
    .toc-link[data-level="5"] { padding-left: 3rem; font-size: 0.72rem; }
    .toc-link[data-level="6"] { padding-left: 3.75rem; font-size: 0.72rem; }

    .toc-toggle {
      display: none;
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 99998;
      background: rgba(22,27,34,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    .toc-toggle:hover {
      color: var(--marker-glow);
      border-color: var(--marker-glow);
    }

    /* ── Markdown Body ─────────────────────────────────────────────────── */

    .markdown-body {
      min-width: 0;
      line-height: 1.7;
      font-size: 1rem;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      margin-top: 1.5em;
      margin-bottom: 0.75em;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
    }

    .markdown-body h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
    .markdown-body h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
    .markdown-body h3 { font-size: 1.25em; }
    .markdown-body h4 { font-size: 1em; }
    .markdown-body h5 { font-size: 0.875em; }
    .markdown-body h6 { font-size: 0.85em; color: var(--text-muted); }

    .markdown-body h1:first-child,
    .markdown-body h2:first-child,
    .markdown-body h3:first-child {
      margin-top: 0;
    }

    .markdown-body p {
      margin-bottom: 1em;
    }

    .markdown-body a {
      color: var(--accent);
      text-decoration: none;
    }

    .markdown-body a:hover {
      text-decoration: underline;
      color: var(--accent-hover);
    }

    .markdown-body strong { font-weight: 600; color: var(--text); }
    .markdown-body em { font-style: italic; }

    .markdown-body img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin: 1em 0;
      display: block;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: var(--border);
      margin: 2em 0;
    }

    /* Lists */
    .markdown-body ul,
    .markdown-body ol {
      padding-left: 1.5em;
      margin-bottom: 1em;
    }

    .markdown-body li {
      margin: 0.25em 0;
    }

    .markdown-body li > ul,
    .markdown-body li > ol {
      margin-bottom: 0;
    }

    /* Task lists */
    .markdown-body input[type="checkbox"] {
      margin-right: 0.4em;
      accent-color: var(--accent);
    }

    /* Blockquotes */
    .markdown-body blockquote {
      border-left: 3px solid var(--marker-glow);
      padding: 0.5rem 1rem;
      margin: 1em 0;
      color: var(--text-muted);
      background: rgba(167,139,250,0.04);
      border-radius: 0 8px 8px 0;
    }

    .markdown-body blockquote p:last-child {
      margin-bottom: 0;
    }

    /* Inline code */
    .markdown-body code {
      background: rgba(110,118,129,0.2);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.875em;
    }

    /* Code blocks */
    .markdown-body pre {
      margin: 1em 0;
      border-radius: 8px;
      overflow: hidden;
    }

    .markdown-body pre code {
      display: block;
      padding: 1rem;
      overflow-x: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    .code-block-wrapper {
      position: relative;
      margin: 1em 0;
    }

    .code-block-wrapper pre {
      margin: 0;
    }

    .code-lang-label {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 0.7rem;
      font-family: 'SFMono-Regular', Consolas, monospace;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      pointer-events: none;
      z-index: 1;
    }

    .code-block-wrapper:has(.code-lang-label) pre code {
      padding-top: 2rem;
    }

    .copy-code-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: var(--text-muted);
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s;
      z-index: 2;
    }

    .code-block-wrapper:hover .copy-code-btn {
      opacity: 1;
    }

    .copy-code-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    .copy-code-btn.copied {
      color: var(--green);
      border-color: var(--green);
    }

    /* Tables */
    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      overflow-x: auto;
      display: block;
    }

    .markdown-body thead { background: var(--surface); }

    .markdown-body th {
      text-align: left;
      font-weight: 600;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .markdown-body td {
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .markdown-body tr:nth-child(even) {
      background: var(--surface);
    }

    /* ── Responsive ────────────────────────────────────────────────────── */

    @media (max-width: 768px) {
      .markdown-layout {
        grid-template-columns: 1fr;
        padding-top: 3.5rem;
      }

      .toc-sidebar {
        position: fixed;
        top: 0; left: 0;
        width: 280px;
        height: 100vh;
        background: var(--surface);
        border-right: 1px solid var(--border);
        padding: 3.5rem 1rem 1rem 1rem;
        z-index: 99998;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        max-height: 100vh;
      }

      .toc-sidebar.mobile-open {
        transform: translateX(0);
      }

      .toc-sidebar.hidden {
        display: block;
        transform: translateX(-100%);
      }

      .toc-toggle { display: block; }
    }

    @media (max-width: 480px) {
      .drop-zone { padding: 2rem 1.5rem; }
      .loading-card { padding: 1.5rem; }
      .error-card { padding: 1.5rem; }
    }

    .back-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: var(--accent, #58a6ff);
      text-decoration: none;
      font-size: 0.85rem;
      z-index: 9999;
      background: var(--bg, #0d1117);
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--border, #30363d);
      opacity: 0.7;
      transition: opacity 0.2s;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .back-link:hover { opacity: 1; text-decoration: underline; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">&larr; Possibility</a>

  <!-- ── Upload Screen ─────────────────────────────────────────────────── -->
  <div id="upload-screen" class="upload-screen">
    <div class="marker-logo">
      <div class="marker-pen">
        <div class="marker-body"></div>
        <div class="marker-grip"></div>
        <div class="marker-tip"></div>
      </div>
      <div class="marker-stroke">
        <svg viewBox="0 0 60 30"><path d="M 0 12 L 20 26 L 55 2" fill="none"/></svg>
      </div>
    </div>
    <h1 class="upload-title">MARKER</h1>
    <p class="upload-subtitle">Markdown Viewer & Renderer</p>
    <div id="drop-zone" class="drop-zone">
      <div class="drop-zone-icon">📝</div>
      <div class="drop-zone-label">Upload .md File</div>
      <div class="drop-zone-hint">Click to browse or drag and drop a Markdown file</div>
      <input type="file" id="file-input" accept=".md,.markdown,.txt">
    </div>
    <div id="file-name" class="file-name-display"></div>
  </div>

  <!-- ── Loading Screen ────────────────────────────────────────────────── -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-card">
      <div class="loading-title">Rendering Document</div>
      <div class="loading-step" id="step-read">
        <div class="step-indicator">📄</div>
        <div class="step-text">
          <span class="label">Reading file</span>
          <span class="detail" id="step-read-detail">Waiting...</span>
        </div>
      </div>
      <div class="loading-step" id="step-parse">
        <div class="step-indicator">⚙️</div>
        <div class="step-text">
          <span class="label">Parsing Markdown</span>
          <span class="detail" id="step-parse-detail">Waiting...</span>
        </div>
      </div>
      <div class="loading-step" id="step-render">
        <div class="step-indicator">📝</div>
        <div class="step-text">
          <span class="label">Rendering document</span>
          <span class="detail" id="step-render-detail">Waiting...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Error Screen ──────────────────────────────────────────────────── -->
  <div id="error-screen" class="error-screen">
    <div class="error-card">
      <div class="error-icon">⚠️</div>
      <div class="error-title">Failed to Render Markdown</div>
      <div class="error-message" id="error-message"></div>
      <div class="error-detail" id="error-detail"></div>
      <button class="btn" onclick="MARKER.reset()">↩ Try Another</button>
    </div>
  </div>

  <!-- ── Markdown Render Target ──────────────────────────────────────── -->
  <div id="component-view" class="component-view">
    <div class="back-pill" onclick="MARKER.reset()">
      <span class="marker-dot"></span>
      <span>MARKER — Load Another</span>
    </div>
    <button id="toc-toggle" class="toc-toggle" onclick="MARKER.toggleTOC()">☰ Contents</button>
    <div class="markdown-layout">
      <nav id="toc-sidebar" class="toc-sidebar">
        <div class="toc-title">Contents</div>
        <ul id="toc-list" class="toc-list"></ul>
      </nav>
      <main id="markdown-output" class="markdown-body"></main>
    </div>
  </div>

  <!-- ── Engine ────────────────────────────────────────────────────────── -->
  <script>
    const MARKER = (() => {

      // ── State ──────────────────────────────────────────────────────────

      let scrollObserver = null;

      const $ = (id) => document.getElementById(id);

      // ── Screen Management ──────────────────────────────────────────────

      function showScreen(name) {
        ['upload-screen', 'loading-screen', 'error-screen', 'component-view'].forEach(id => {
          const el = $(id);
          if (id === name) {
            el.classList.add('active');
            el.classList.remove('hidden');
          } else {
            el.classList.remove('active');
            el.classList.add('hidden');
          }
        });
      }

      function setStep(stepId, state, detail) {
        const step = $(stepId);
        step.classList.remove('active', 'done');
        if (state) step.classList.add(state);
        const detailEl = $(`${stepId}-detail`);
        if (detailEl && detail) detailEl.textContent = detail;
      }

      function resetSteps() {
        ['step-read', 'step-parse', 'step-render'].forEach(id => {
          setStep(id, null, 'Waiting...');
        });
      }

      // ── Deployment Pipeline ────────────────────────────────────────────

      async function deploy(file) {
        showScreen('loading-screen');
        resetSteps();

        try {
          // Step 1: Read file
          setStep('step-read', 'active', `Reading ${file.name}...`);
          const markdown = await readFile(file);
          await delay(300);
          setStep('step-read', 'done', `${file.name} (${(markdown.length / 1024).toFixed(1)} KB)`);

          // Step 2: Parse markdown
          setStep('step-parse', 'active', 'Parsing markdown...');

          marked.setOptions({
            highlight: function(code, lang) {
              try {
                if (lang && hljs.getLanguage(lang)) {
                  return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
              } catch (e) {
                return code;
              }
            },
            breaks: false,
            gfm: true
          });

          const html = marked.parse(markdown);
          await delay(300);
          setStep('step-parse', 'done', 'Markdown parsed successfully');

          // Step 3: Render
          setStep('step-render', 'active', 'Rendering document...');
          await delay(200);

          const output = $('markdown-output');
          output.innerHTML = html;

          // Post-processing
          wrapCodeBlocks(output);
          const toc = buildTableOfContents(output);
          renderTOC(toc);
          setupScrollSpy();

          await delay(300);
          setStep('step-render', 'done', 'Document rendered');

          await delay(400);
          showScreen('component-view');
          window.scrollTo(0, 0);

        } catch (err) {
          showError(err.message, err.stack || '');
        }
      }

      // ── Code Block Post-Processing ─────────────────────────────────────

      function wrapCodeBlocks(container) {
        container.querySelectorAll('pre > code').forEach(codeEl => {
          const pre = codeEl.parentElement;
          const wrapper = document.createElement('div');
          wrapper.className = 'code-block-wrapper';
          pre.parentNode.insertBefore(wrapper, pre);
          wrapper.appendChild(pre);

          // Language label
          const langMatch = codeEl.className.match(/language-(\w+)/);
          if (langMatch) {
            const label = document.createElement('span');
            label.className = 'code-lang-label';
            label.textContent = langMatch[1];
            wrapper.appendChild(label);
          }

          // Copy button
          const btn = document.createElement('button');
          btn.className = 'copy-code-btn';
          btn.textContent = 'Copy';
          btn.addEventListener('click', async () => {
            try {
              await navigator.clipboard.writeText(codeEl.textContent);
            } catch (e) {
              // Fallback for non-HTTPS contexts
              const textarea = document.createElement('textarea');
              textarea.value = codeEl.textContent;
              textarea.style.cssText = 'position:fixed;opacity:0';
              document.body.appendChild(textarea);
              textarea.select();
              document.execCommand('copy');
              document.body.removeChild(textarea);
            }
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => {
              btn.textContent = 'Copy';
              btn.classList.remove('copied');
            }, 2000);
          });
          wrapper.appendChild(btn);
        });
      }

      // ── Table of Contents ──────────────────────────────────────────────

      function buildTableOfContents(container) {
        const headings = container.querySelectorAll('h1, h2, h3, h4, h5, h6');
        const toc = [];
        headings.forEach((heading, index) => {
          const id = 'heading-' + index;
          heading.id = id;
          toc.push({
            id,
            text: heading.textContent,
            level: parseInt(heading.tagName.charAt(1))
          });
        });
        return toc;
      }

      function renderTOC(toc) {
        const tocList = $('toc-list');
        const tocSidebar = $('toc-sidebar');
        tocList.innerHTML = '';

        if (toc.length < 3) {
          tocSidebar.classList.add('hidden');
          return;
        }

        tocSidebar.classList.remove('hidden');

        toc.forEach(item => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.className = 'toc-link';
          a.href = '#' + item.id;
          a.textContent = item.text;
          a.dataset.level = item.level;
          a.addEventListener('click', (e) => {
            e.preventDefault();
            const target = document.getElementById(item.id);
            if (target) {
              target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            // Close mobile TOC
            tocSidebar.classList.remove('mobile-open');
          });
          li.appendChild(a);
          tocList.appendChild(li);
        });
      }

      function setupScrollSpy() {
        if (scrollObserver) {
          scrollObserver.disconnect();
        }

        const headings = document.querySelectorAll('#markdown-output h1, #markdown-output h2, #markdown-output h3, #markdown-output h4, #markdown-output h5, #markdown-output h6');
        if (headings.length === 0) return;

        scrollObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const id = entry.target.id;
              document.querySelectorAll('.toc-link').forEach(link => {
                link.classList.toggle('active', link.getAttribute('href') === '#' + id);
              });
            }
          });
        }, {
          rootMargin: '-60px 0px -80% 0px',
          threshold: 0
        });

        headings.forEach(h => scrollObserver.observe(h));
      }

      // ── Helpers ────────────────────────────────────────────────────────

      function readFile(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error('Failed to read file'));
          reader.readAsText(file);
        });
      }

      function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
      }

      function showError(message, detail) {
        $('error-message').textContent = message;
        $('error-detail').textContent = detail || 'No additional details';
        showScreen('error-screen');
      }

      function toggleTOC() {
        const sidebar = $('toc-sidebar');
        sidebar.classList.toggle('mobile-open');
      }

      // ── Public API ─────────────────────────────────────────────────────

      function reset() {
        if (scrollObserver) {
          scrollObserver.disconnect();
          scrollObserver = null;
        }
        $('markdown-output').innerHTML = '';
        $('toc-list').innerHTML = '';
        $('file-input').value = '';
        $('file-name').classList.remove('visible');
        showScreen('upload-screen');
      }

      return { deploy, reset, toggleTOC };
    })();

    // ── Event Wiring ──────────────────────────────────────────────────── //

    document.addEventListener('DOMContentLoaded', () => {
      const fileInput = document.getElementById('file-input');
      const dropZone = document.getElementById('drop-zone');
      const fileNameDisplay = document.getElementById('file-name');

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          fileNameDisplay.textContent = file.name;
          fileNameDisplay.classList.add('visible');
          setTimeout(() => MARKER.deploy(file), 300);
        }
      });

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) {
          fileNameDisplay.textContent = file.name;
          fileNameDisplay.classList.add('visible');
          setTimeout(() => MARKER.deploy(file), 300);
        }
      });
    });
  </script>

</body>
</html>
